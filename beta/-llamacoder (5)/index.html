<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icona.jpg">
    <title>Card Inquiry East Coast Collectibles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        :root { color-scheme: dark; }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: #0f172a;
        }

            display: flex;
            align-items: center;
        }

            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            appearance: none;

            outline: none;
        }

            display: flex;
            justify-content: space-around;
            width: 100%;
            padding: 0 10px;
        }

            transition: opacity 0.5s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 min-h-screen transition-colors duration-300">

<div id="app"></div>
<script>
// ==========================================
// CONFIGURATION AREA - MODIFY THESE TO UPDATE THE APP CONTENT
// ==========================================
const APP_CONFIG = {
    appTitle: "<span style='font-size: 24px;'>Card Inquiry</span><br><span style='font-size: 18px;'>East Coast Collectibles</span>", 
    storeUrl: "https://essexconsolerepair.co.uk",
    adTitle: "Essex Console Repair",
    adDescription: "Ps5/Xbox/Switch/Hdmi Ports",
    phoneNumber: "447749893611",
    bannerImages: ["ecc1.png", "ecc2.png", "ecc3.png"],
    // ==========================================
    // PRICING CONFIGURATION - MODIFY THESE VALUES TO CHANGE MARKUP RATES
    // ==========================================
    pricing: {
        gbpRate: 0.78,           // USD to GBP conversion rate
        minPriceGbp: 0.20,       // Minimum price floor (no card under this amount)
        tier1Threshold: 5.00,    // Tier 1 upper limit (£5) - CHANGE THIS TO MODIFY TIER 1 BOUNDARY
        tier2Threshold: 50.00,   // Tier 2 upper limit (£50) - CHANGE THIS TO MODIFY TIER 2 BOUNDARY
        tier1Markup: 1.40,       // 40% markup for cards under £5 - CHANGE 1.40 TO MODIFY PERCENTAGE
        tier2Markup: 1.20,       // 20% markup for cards £5 to £50 - CHANGE 1.20 TO MODIFY PERCENTAGE
        tier3Markup: 1.10,       // 10% markup for cards over £50 - CHANGE 1.10 TO MODIFY PERCENTAGE
    }
    // ==========================================
    // MARKUP LOGIC EXPLANATION:
    // - Under £5: Adds 40% markup (tier1Markup)
    // - £5 to £50: Adds 20% markup (tier2Markup)
    // - Over £50: Adds 10% markup (tier3Markup)
    // 
    // To change markup percentages:
    // - 40% = 1.40, 30% = 1.30, 20% = 1.20, 10% = 1.10, etc.
    // ==========================================
};
// ==========================================

const API_BASE = "https://api.pokemontcg.io/v2";

// STATE
let state = {
    view: 'search',
    cards: [],
    selectedCard: null,
    shoppingList: JSON.parse(localStorage.getItem('tcgInquiryList') || '[]'),
    sets: [],
    rarities: [],
    isLoading: false,
    hasSearched: false,
    showAd: true,
    isDark: localStorage.getItem('theme') === null ? true : localStorage.getItem('theme') === 'dark',
    searchTerm: '',
    selectedSet: '',
    selectedRarity: '',
    currentBannerIndex: 0,
    currentTheme: localStorage.getItem('appTheme') || 'dark'
};

// Available themes
const themes = {
    dark: { bg: 'bg-slate-900', card: 'bg-slate-800', text: 'text-white', textMuted: 'text-slate-400', border: 'border-slate-700', accent: 'text-blue-400', button: 'bg-slate-800' },
    light: { bg: 'bg-slate-100', card: 'bg-white', text: 'text-slate-900', textMuted: 'text-slate-500', border: 'border-slate-200', accent: 'text-blue-600', button: 'bg-slate-100' },
    ocean: { bg: 'bg-cyan-950', card: 'bg-cyan-900', text: 'text-cyan-50', textMuted: 'text-cyan-300', border: 'border-cyan-700', accent: 'text-teal-400', button: 'bg-cyan-800' },
    forest: { bg: 'bg-emerald-950', card: 'bg-emerald-900', text: 'text-emerald-50', textMuted: 'text-emerald-300', border: 'border-emerald-700', accent: 'text-green-400', button: 'bg-emerald-800' },
    sunset: { bg: 'bg-orange-950', card: 'bg-orange-900', text: 'text-orange-50', textMuted: 'text-orange-300', border: 'border-orange-700', accent: 'text-amber-400', button: 'bg-orange-800' },
    navy: { bg: 'bg-blue-950', card: 'bg-blue-900', text: 'text-blue-50', textMuted: 'text-blue-300', border: 'border-blue-700', accent: 'text-indigo-400', button: 'bg-blue-800' },
    berry: { bg: 'bg-purple-950', card: 'bg-purple-900', text: 'text-purple-50', textMuted: 'text-purple-300', border: 'border-purple-700', accent: 'text-pink-400', button: 'bg-purple-800' },
    lavender: { bg: 'bg-violet-950', card: 'bg-violet-900', text: 'text-violet-50', textMuted: 'text-violet-300', border: 'border-violet-700', accent: 'text-fuchsia-400', button: 'bg-violet-800' },
    charcoal: { bg: 'bg-neutral-950', card: 'bg-neutral-900', text: 'text-neutral-50', textMuted: 'text-neutral-400', border: 'border-neutral-700', accent: 'text-stone-400', button: 'bg-neutral-800' },
    rose: { bg: 'bg-rose-950', card: 'bg-rose-900', text: 'text-rose-50', textMuted: 'text-rose-300', border: 'border-rose-700', accent: 'text-red-400', button: 'bg-rose-800' }
};

const themeOrder = ['dark', 'light', 'ocean', 'forest', 'sunset', 'navy', 'berry', 'lavender', 'charcoal', 'rose'];

// ==========================================
// PRICING FUNCTIONS - TIERED MARKUP LOGIC
// ==========================================
function getBaseGbpPrice(usd) {
    return usd * APP_CONFIG.pricing.gbpRate;
}

function getMarkupPercentage(gbpPrice) {
    const config = APP_CONFIG.pricing;
    if (gbpPrice < config.tier1Threshold) {
        return "40%";
    } else if (gbpPrice < config.tier2Threshold) {
        return "20%";
    } else {
        return "10%";
    }
}

function formatPrice(usd) {
    const config = APP_CONFIG.pricing;
    
    // Convert USD to GBP first
    let gbp = usd * config.gbpRate;

    // Apply tiered markup based on GBP price
    if (gbp < config.tier1Threshold) {
        // Tier 1: Under £5 - add 40% markup
        gbp = gbp * config.tier1Markup;
    } else if (gbp < config.tier2Threshold) {
        // Tier 2: £5 to £50 - add 20% markup
        gbp = gbp * config.tier2Markup;
    } else {
        // Tier 3: Over £50 - add 10% markup
        gbp = gbp * config.tier3Markup;
    }

    // Apply minimum price floor
    if (gbp < config.minPriceGbp) {
        gbp = config.minPriceGbp;
    }

    return `£${gbp.toFixed(2)}`;
}
// ==========================================

function getFullCardCode(card) {
    const number = String(card.number);
    const total = String(card.set.printedTotal || card.set.total);
    if (!isNaN(number) && !isNaN(total)) {
        return `${number.padStart(total.length, '0')}/${total}`;
    }
    return `${number}/${total}`;
}

async function initApp() {
    try {
        const [setsRes, raritiesRes, rateRes] = await Promise.all([
            fetch(`${API_BASE}/sets?orderBy=-releaseDate`),
            fetch(`${API_BASE}/rarities`),
            fetch('https://open.er-api.com/v6/latest/USD')
        ]);
        const setsData = await setsRes.json();
        const raritiesData = await raritiesRes.json();
        const rateData = await rateRes.json();
        state.sets = setsData.data || [];
        state.rarities = raritiesData.data || [];
        APP_CONFIG.pricing.gbpRate = rateData.rates?.GBP || 0.78;
        render();
        startBannerSlideshow();
    } catch (error) {
        console.error('Failed to initialize:', error);
    }
}

async function executeSearch() {
    const { searchTerm, selectedSet, selectedRarity } = state;
    if (!searchTerm && !selectedSet && !selectedRarity) return;

    state.showAd = false;
    state.isLoading = true;
    state.hasSearched = true;
    render();

    let queryParts = [];
    if (searchTerm) {
        const term = searchTerm.trim();
        if (term.includes('/')) {
            const parts = term.split('/');
            const num = parts[0].replace(/^0+/, ''); 
            const total = parts[1];
            queryParts.push(`number:${num} AND (set.printedTotal:${total} OR set.total:${total})`);
        } else {
            queryParts.push(`name:"${term}*"`);
        }
    }
    if (selectedSet) queryParts.push(`set.name:"${selectedSet}"`);
    if (selectedRarity) queryParts.push(`rarity:"${selectedRarity}"`);

    const query = queryParts.join(' AND ');
    try {
        const url = `${API_BASE}/cards?q=${encodeURIComponent(query)}&orderBy=-set.releaseDate,number&pageSize=96`;
        const res = await fetch(url);
        const data = await res.json();
        state.cards = data.data || [];
    } catch (error) {
        console.error('Search failed:', error);
        state.cards = [];
    } finally {
        state.isLoading = false;
        render();
    }
}

function resetHome() {
    state.view = 'search';
    state.cards = [];
    state.searchTerm = '';
    state.selectedSet = '';
    state.selectedRarity = '';
    state.selectedCard = null;
    state.showAd = true;
    state.hasSearched = false;
    render();
}

function toggleTheme() {
    const currentIndex = themeOrder.indexOf(state.currentTheme);
    const nextIndex = (currentIndex + 1) % themeOrder.length;
    state.currentTheme = themeOrder[nextIndex];
    localStorage.setItem('appTheme', state.currentTheme);
    
    // Update dark mode class for backward compatibility
    state.isDark = !['light', 'lavender'].includes(state.currentTheme);
    document.documentElement.classList.toggle('dark', state.isDark);
    
    const metaTheme = document.querySelector('meta[name="theme-color"]');
    if (metaTheme) {
        metaTheme.setAttribute('content', state.isDark ? '#0f172a' : '#f1f5f9');
    }
    render();
}

function handleSearchInput(value) { state.searchTerm = value; }
function handleSetChange(value) { state.selectedSet = value; executeSearch(); }
function handleRarityChange(value) { state.selectedRarity = value; executeSearch(); }

function handleCardClick(card) {
    state.selectedCard = card;
    state.view = 'details';
    history.pushState({ view: 'details', card: card }, '');
    window.scrollTo(0, 0);
    render();
}

function handleAddToList(card, type, price) {
    const uid = `${card.id}-${type}`;
    if (state.shoppingList.some(item => item.uid === uid)) return;
    
    const cardCode = getFullCardCode(card);
    
    state.shoppingList.push({
        uid,
        name: card.name,
        set: card.set.name,
        num: cardCode,
        type,
        price,
        imageUrl: card.images.large,
        fullData: JSON.parse(JSON.stringify(card))
    });
    localStorage.setItem('tcgInquiryList', JSON.stringify(state.shoppingList));
    render();
}

function handleRemoveItem(e, index) {
    e.stopPropagation();
    state.shoppingList.splice(index, 1);
    localStorage.setItem('tcgInquiryList', JSON.stringify(state.shoppingList));
    render();
}

function handleSendWhatsApp() {
    if (state.shoppingList.length === 0) return;
    let message = "Hi Dave, I'm checking if you have these cards. I understand prices are guides:\n\n";
    state.shoppingList.forEach((item, i) => {
        message += `*${i + 1}. ${item.name}*\nSet: ${item.set} (${item.num})\nVariant: ${item.type} | Guide: ${item.price}\nImage: ${item.imageUrl}\n\n`;
    });
    window.open(`https://wa.me/${APP_CONFIG.phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
}

function goBack() {
    if (window.history.length > 1 && state.view !== 'search') {
        history.back();
    } else {
        resetHome();
    }
}

function openList() {
    state.view = 'list';
    history.pushState({ view: 'list' }, '');
    window.scrollTo(0, 0);
    render();
}

function startBannerSlideshow() {
    setInterval(() => {
        state.currentBannerIndex = (state.currentBannerIndex + 1) % APP_CONFIG.bannerImages.length;
        const bannerImg = document.getElementById('banner-slideshow');
        if (bannerImg) {
            bannerImg.style.opacity = '0';
            setTimeout(() => {
                bannerImg.src = APP_CONFIG.bannerImages[state.currentBannerIndex];
                bannerImg.style.opacity = '1';
            }, 500);
        }
    }, 8000);
}

// UI COMPONENTS
function renderSocialStories() {
    const theme = themes[state.currentTheme];
    const socials = [
        { name: 'TikTok', color: 'bg-black', icon: '📱', url: 'https://www.tiktok.com/@east.coast.collec1' },
        { name: 'Facebook', color: 'bg-blue-600', icon: '👥', url: 'https://www.facebook.com/p/East-Coast-Collectables-61583954579869/' },
        { name: 'WhatsApp', color: 'bg-green-500', icon: '💬', url: `https://wa.me/${APP_CONFIG.phoneNumber}` },
        { name: 'Web', color: 'bg-slate-700', icon: '🌐', url: `https://share.google/U7aWnYjaMe3HzClcR` }
    ];
    
    return `
        <div class="px-4 pt-4">
             <div class="block w-full aspect-[4/3] ${theme.card} rounded-2xl overflow-hidden shadow-md border ${theme.border} mb-4">
                <img id="banner-slideshow" src="${APP_CONFIG.bannerImages[state.currentBannerIndex]}" class="w-full h-full object-cover" alt="TCG Featured" />
             </div>
        </div>
        <div class="px-2 pb-4 flex justify-around items-center">
            ${socials.map(s => `
                <a href="${s.url}" target="_blank" class="flex flex-col items-center gap-1">
                    <div class="w-16 h-16 rounded-full p-[2px] bg-gradient-to-tr from-blue-500 to-green-400">
                        <div class="${theme.card} w-full h-full rounded-full p-1">
                            <div class="${s.color} w-full h-full rounded-full flex items-center justify-center text-xl shadow-inner">
                                ${s.icon}
                            </div>
                        </div>
                    </div>
                    <span class="text-[10px] font-bold ${theme.textMuted} uppercase tracking-tighter">${s.name}</span>
                </a>
            `).join('')}
        </div>
    `;
}

function renderSponsorCard() {
    const theme = themes[state.currentTheme];
    return `
        <div class="p-4">
            <a href="${APP_CONFIG.storeUrl}" target="_blank" class="block ${theme.card} rounded-2xl overflow-hidden shadow-md border ${theme.border}">
                <div class="p-4">
                    <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Advertisement</span>
                    <h3 class="text-lg font-bold ${theme.text} mt-1">${APP_CONFIG.adTitle}</h3>
                    <p class="text-xs ${theme.textMuted} mt-1">${APP_CONFIG.adDescription}</p>
                </div>
            </a>
        </div>
    `;
}

function renderSearchHeader() {
    const theme = themes[state.currentTheme];
    return `
        <header class="sticky top-0 z-50 ${theme.card}/90 backdrop-blur-xl border-b ${theme.border}">
            <div class="flex items-center justify-between px-4 py-3">
                <div class="flex items-center gap-3">
                    <button onclick="resetHome()" class="p-2 ${theme.button} rounded-xl hover:opacity-80 transition-all ${theme.text}">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    </button>
                    <h1 class="text-2xl font-extrabold ${theme.text} tracking-tight">${APP_CONFIG.appTitle}</h1>
                </div>
                <button onclick="toggleTheme()" class="p-2 rounded-full ${theme.button} hover:opacity-80 transition-colors" title="Theme: ${state.currentTheme}">
                    <svg class="w-5 h-5 ${theme.text}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
            </div>
            <div class="px-4 pb-3">
                <form action="#" onsubmit="event.preventDefault(); executeSearch();" class="relative ${theme.card} rounded-xl flex items-center px-4 h-12 border ${theme.border}">
                    <svg class="w-5 h-5 ${theme.textMuted} mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input 
                        type="search" 
                        value="${state.searchTerm}"
                        oninput="handleSearchInput(this.value)"
                        placeholder="Type card name or number..."
                        enterkeyhint="search"
                        class="w-full bg-transparent border-none outline-none ${theme.text} placeholder-slate-400 font-medium"
                    />
                </form>
            </div>
            <div class="flex gap-2 px-4 pb-4">
                <div class="fixed-dropdown-container ${theme.card} rounded-lg px-3 border ${theme.border}">
                    <select onchange="handleSetChange(this.value)" class="text-sm font-bold ${theme.text}">
                        <option value="">Set...</option>
                        ${state.sets.map(s => `<option value="${s.name}" ${state.selectedSet === s.name ? 'selected' : ''}>${s.name}</option>`).join('')}
                    </select>
                </div>
                <div class="fixed-dropdown-container ${theme.card} rounded-lg px-3 border ${theme.border}">
                    <select onchange="handleRarityChange(this.value)" class="text-sm font-bold ${theme.text}">
                        <option value="">Rarity...</option>
                        ${state.rarities.map(r => `<option value="${r}" ${state.selectedRarity === r ? 'selected' : ''}>${r}</option>`).join('')}
                    </select>
                </div>
            </div>
        </header>
    `;
}

function renderCardGrid() {
    const theme = themes[state.currentTheme];
    if (state.cards.length === 0) {
        return state.hasSearched ? `<div class="flex flex-col items-center justify-center py-20 ${theme.textMuted}"><p class="text-lg font-medium">No cards found</p></div>` : ''; 
    }
    return `
        <div class="grid grid-cols-2 gap-4 p-4">
            ${state.cards.map((card, i) => `
                <button onclick="handleCardClick(state.cards[${i}])" class="${theme.card} rounded-2xl p-3 shadow-md border ${theme.border} text-left hover:scale-[1.02] transition-transform">
                    <div class="aspect-[1/1.4] ${theme.card} rounded-xl mb-2 flex items-center justify-center overflow-hidden">
                        <img src="${card.images.small}" alt="${card.name}" loading="lazy" class="max-w-[90%] max-h-[90%] object-contain" />
                    </div>
                    <h3 class="font-bold text-sm ${theme.text} line-clamp-2">${card.name}</h3>
                    <p class="text-xs ${theme.textMuted} mt-1">${card.set.name}</p>
                </button>
            `).join('')}
        </div>
    `;
}

function renderLoadingSpinner() {
    const theme = themes[state.currentTheme];
    return `
        <div class="flex flex-col items-center justify-center py-20 ${theme.textMuted}">
            <div class="w-10 h-10 border-4 border-slate-200 dark:border-slate-700 border-t-blue-500 rounded-full animate-spin"></div>
            <p class="mt-4 font-medium uppercase text-xs">Searching...</p>
        </div>
    `;
}

function renderCardDetails() {
    const theme = themes[state.currentTheme];
    const card = state.selectedCard;
    if (!card) return '';
    const displayNum = getFullCardCode(card);
    const ebayLink = `https://www.ebay.co.uk/sch/i.html?_from=R40&_nkw=${encodeURIComponent(card.name + ' ' + displayNum + ' ' + card.set.name + ' sold')}&LH_Sold=1&LH_Complete=1`;
    const prices = card.tcgplayer?.prices || {};
    let priceBoxes = '';
    
    if (Object.keys(prices).length > 0) {
        priceBoxes = Object.entries(prices).map(([type, priceData]) => {
            if (!priceData.market) return '';
            const priceDisplay = formatPrice(priceData.market);
            const baseGbp = getBaseGbpPrice(priceData.market);
            const markupPercent = getMarkupPercentage(baseGbp);
            const uid = `${card.id}-${type}`;
            const isAdded = state.shoppingList.some(item => item.uid === uid);
            return `
                <div class="${theme.card} rounded-2xl p-5 mb-4 border ${theme.border}">
                    <div class="text-xs font-bold ${theme.textMuted} uppercase text-center mb-1">${type} - Guide Price</div>
                    <div class="text-4xl font-black text-center ${theme.accent} mb-2">${priceDisplay}</div>
                    <div class="text-xs text-center mb-4 ${theme.textMuted}">Base: £${baseGbp.toFixed(2)} • Markup: ${markupPercent}</div>
                    <button onclick="handleAddToList(state.selectedCard, '${type}', '${priceDisplay}')" ${isAdded ? 'disabled' : ''}
                        class="w-full h-14 rounded-xl font-bold flex items-center justify-center gap-2 ${isAdded ? 'bg-slate-200 dark:bg-slate-600 text-slate-400' : 'bg-green-500 hover:bg-green-600 text-white shadow-lg shadow-green-500/20'} transition-all">
                        ${isAdded ? 'Added to List' : 'Add to Inquiry List'}
                    </button>
                    <a href="${ebayLink}" target="_blank" class="block mt-3">
                        <button class="w-full h-10 rounded-xl font-bold flex items-center justify-center gap-2 border-2 border-blue-600 text-blue-600 dark:border-blue-400 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-colors">
                            View eBay Sold
                        </button>
                    </a>
                </div>
            `;
        }).join('');
    } else {
        priceBoxes = `
            <div class="${theme.card} rounded-2xl p-5 text-center border ${theme.border}">
                <div class="text-2xl font-black ${theme.textMuted} mb-4">PRICE TBC</div>
                <button onclick="handleAddToList(state.selectedCard, 'Standard', 'TBC')" class="w-full h-14 rounded-xl font-bold bg-green-500 text-white mb-3">Add to Inquiry List</button>
                <a href="${ebayLink}" target="_blank" class="block">
                    <button class="w-full h-10 rounded-xl font-bold flex items-center justify-center gap-2 border-2 border-blue-600 text-blue-600 dark:border-blue-400 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-colors">
                        View eBay Sold
                    </button>
                </a>
            </div>`;
    }
    return `
        <div class="min-h-screen ${theme.bg} p-4">
            <div class="max-w-md mx-auto">
                <button onclick="goBack()" class="flex items-center gap-2 ${theme.text} mb-4 font-bold">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Back
                </button>
                <div class="${theme.card} rounded-3xl p-6 shadow-xl border ${theme.border}">
                    <img src="${card.images.large}" class="w-full rounded-2xl shadow-lg mb-6 border ${theme.border}" />
                    <h1 class="text-2xl font-black text-center ${theme.text} leading-tight">${card.name}</h1>
                    <p class="${theme.textMuted} text-center font-bold text-sm mb-6">${card.set.name} • ${displayNum}</p>
                    <div class="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-2xl p-4 mb-6">
                        <p class="text-[11px] leading-relaxed text-amber-800 dark:text-amber-200 font-medium text-center">
                            <b>Please Note:</b> Prices are for guide only. Prices & Stock will be confirmed by <b>East Coast Collectibles by WhatsApp</b>.
                        </p>
                    </div>
                    ${priceBoxes}
                </div>
            </div>
        </div>
    `;
}

function renderInquiryList() {
    const theme = themes[state.currentTheme];
    const items = state.shoppingList;
    return `
        <div class="fixed inset-0 ${theme.bg} z-50 overflow-y-auto">
            <div class="max-w-md mx-auto p-4 pb-32">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-black ${theme.text}">Inquiry List</h2>
                    <button onclick="goBack()" class="p-2 ${theme.card} rounded-full shadow-md ${theme.text}"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
                ${items.length === 0 ? `<div class="text-center py-20 ${theme.textMuted} font-bold uppercase tracking-widest text-xs">No cards in list</div>` : 
                `<div class="space-y-3">
                    ${items.map((item, index) => `
                        <div onclick="handleCardClick(state.shoppingList[${index}].fullData)" class="${theme.card} rounded-2xl p-4 border ${theme.border} shadow-sm flex gap-4 cursor-pointer hover:border-blue-500 transition-colors">
                            <img src="${item.imageUrl}" class="w-16 h-auto rounded-lg pointer-events-none" />
                            <div class="flex-1 pointer-events-none">
                                <h3 class="font-black ${theme.text} text-sm">${item.name}</h3>
                                <p class="text-[11px] ${theme.textMuted} font-bold">${item.set} (${item.num})</p>
                                <p class="${theme.accent} font-black text-sm mt-1">${item.price}</p>
                            </div>
                            <button onclick="handleRemoveItem(event, ${index})" class="text-red-500 self-start p-2 relative z-10"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                        </div>
                    `).join('')}
                    <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-slate-100 dark:from-slate-900 via-slate-100 dark:via-slate-900 to-transparent">
                        <button onclick="handleSendWhatsApp()" class="w-full max-w-md mx-auto h-16 bg-green-500 text-white rounded-2xl font-black flex items-center justify-center gap-3 shadow-xl shadow-green-500/20">
                            Send Inquiry to Dave
                        </button>
                    </div>
                </div>`}
            </div>
        </div>
    `;
}

function renderCartBar() {
    const theme = themes[state.currentTheme];
    const count = state.shoppingList.length;
    if (count === 0 || state.view !== 'search') return '';
    return `
        <button onclick="openList()" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-blue-600 text-white h-16 rounded-3xl flex items-center justify-between px-6 shadow-2xl z-50 font-black transition-transform hover:scale-105 active:scale-95">
            <span>Inquiry List</span>
            <span class="bg-white text-blue-600 px-3 py-1 rounded-xl">${count}</span>
        </button>
    `;
}

function render() {
    const app = document.getElementById('app');
    let content = '';
    
    document.documentElement.classList.toggle('dark', state.isDark);
    
    if (state.view === 'search') {
        content = `
            ${renderSearchHeader()}
            ${state.showAd ? `
                ${renderSocialStories()}
                ${renderSponsorCard()}
            ` : ''}
            ${state.isLoading ? renderLoadingSpinner() : renderCardGrid()}
            ${renderCartBar()}
        `;
    } else if (state.view === 'details') {
        content = renderCardDetails();
    } else if (state.view === 'list') {
        content = renderInquiryList();
    }
    app.innerHTML = content;
}

window.addEventListener('popstate', (event) => {
    state.view = (event.state && event.state.view) ? event.state.view : 'search';
    state.selectedCard = (event.state && event.state.card) ? event.state.card : null;
    render();
});

document.documentElement.classList.toggle('dark', state.isDark);
initApp();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
    });
}
</script>
</body>
</html>
