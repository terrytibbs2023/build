<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icona.jpg">
    
    <title>Card Inquiry East Coast Collectibles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --accent: #3b82f6;
        }

        .light {
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --bg-input: #e2e8f0;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border: #cbd5e1;
            --accent: #2563eb;
        }

        .emerald {
            --bg-main: #064e3b;
            --bg-card: #065f46;
            --bg-input: #047857;
            --text-main: #ecfdf5;
            --text-dim: #a7f3d0;
            --border: #059669;
            --accent: #34d399;
        }

        .rose {
            --bg-main: #4c0519;
            --bg-card: #881337;
            --bg-input: #9f1239;
            --text-main: #fff1f2;
            --text-dim: #fecdd3;
            --border: #be123c;
            --accent: #fb7185;
        }

        .amber {
            --bg-main: #451a03;
            --bg-card: #78350f;
            --bg-input: #92400e;
            --text-main: #fffbeb;
            --text-dim: #fde68a;
            --border: #b45309;
            --accent: #fbbf24;
        }

        .midnight {
            --bg-main: #1e1b4b;
            --bg-card: #312e81;
            --bg-input: #3730a3;
            --text-main: #eef2ff;
            --text-dim: #c7d2fe;
            --border: #4338ca;
            --accent: #818cf8;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        /* Override Tailwind with variables for full theme support */
        header { background-color: var(--bg-main) !important; border-color: var(--border) !important; }
        .card-bg { background-color: var(--bg-card) !important; border-color: var(--border) !important; }
        .input-bg { background-color: var(--bg-input) !important; color: var(--text-main) !important; }
        .text-primary { color: var(--text-main) !important; }
        .text-secondary { color: var(--text-dim) !important; }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .fixed-dropdown-container { height: 42px; width: 50%; display: flex; align-items: center; }
        select { width: 100%; appearance: none; background: transparent; border: none; outline: none; color: inherit; font-weight: bold; }
        #banner-slideshow { transition: opacity 0.5s ease-in-out; }
    </style>
</head>
<body class="min-h-screen">

<div id="app"></div>

<script>
const APP_CONFIG = {
    appTitle: "<span style='font-size: 24px;'>Card Inquiry</span><br><span style='font-size: 18px;'>East Coast Collectibles</span>", 
    storeUrl: "https://essexconsolerepair.co.uk", 
    adTitle: "Essex Console Repair",             
    adDescription: "Ps5/Xbox/Switch/Hdmi Ports", 
    phoneNumber: "447749893611",                  
    bannerImages: ["ecc1.png", "ecc2.png", "ecc3.png"], 
    markupUnder5: 1.40, 
    markupOver5: 1.10,  
    minPriceGbp: 0.20                            
};

const API_BASE = "https://api.pokemontcg.io/v2";
const THEMES = ['dark', 'light', 'emerald', 'rose', 'amber', 'midnight'];

let state = {
    view: 'search',
    cards: [],
    selectedCard: null,
    shoppingList: JSON.parse(localStorage.getItem('tcgInquiryList') || '[]'),
    sets: [],
    rarities: [],
    gbpRate: 0.78,
    isLoading: false,
    hasSearched: false,
    showAd: true,
    currentTheme: localStorage.getItem('appTheme') || 'dark',
    searchTerm: '',
    selectedSet: '',
    selectedRarity: '',
    currentBannerIndex: 0 
};

function formatPrice(usd) {
    let baseGbp = usd * state.gbpRate;
    let finalGbp = baseGbp < 5 ? baseGbp * APP_CONFIG.markupUnder5 : baseGbp * APP_CONFIG.markupOver5;
    if (finalGbp < APP_CONFIG.minPriceGbp) finalGbp = APP_CONFIG.minPriceGbp;
    return `£${finalGbp.toFixed(2)}`;
}

function getFullCardCode(card) {
    return `${card.number}/${card.set.printedTotal || card.set.total}`;
}

async function initApp() {
    try {
        const [setsRes, raritiesRes, rateRes] = await Promise.all([
            fetch(`${API_BASE}/sets?orderBy=-releaseDate`),
            fetch(`${API_BASE}/rarities`),
            fetch('https://open.er-api.com/v6/latest/USD')
        ]);
        const setsData = await setsRes.json();
        const raritiesData = await raritiesRes.json();
        const rateData = await rateRes.json();
        state.sets = setsData.data || [];
        state.rarities = raritiesData.data || [];
        state.gbpRate = rateData.rates?.GBP || 0.78;
        render();
        startBannerSlideshow();
    } catch (error) { console.error('Init failed:', error); }
}

async function executeSearch() {
    if (!state.searchTerm && !state.selectedSet && !state.selectedRarity) return;
    state.showAd = false;
    state.isLoading = true;
    state.hasSearched = true;
    render();
    
    let queryParts = [];
    if (state.searchTerm) {
        const term = state.searchTerm.trim();
        if (term.includes('/')) {
            const [num, total] = term.split('/');
            queryParts.push(`number:${num.replace(/^0+/, '')} AND (set.printedTotal:${total} OR set.total:${total})`);
        } else { queryParts.push(`name:"${term}*"`); }
    }
    if (state.selectedSet) queryParts.push(`set.name:"${state.selectedSet}"`);
    if (state.selectedRarity) queryParts.push(`rarity:"${state.selectedRarity}"`);
    
    try {
        const res = await fetch(`${API_BASE}/cards?q=${encodeURIComponent(queryParts.join(' AND '))}&orderBy=-set.releaseDate,number&pageSize=96`);
        const data = await res.json();
        state.cards = data.data || [];
    } catch (error) { state.cards = []; } finally {
        state.isLoading = false;
        render();
    }
}

function cycleTheme() {
    const next = THEMES[(THEMES.indexOf(state.currentTheme) + 1) % THEMES.length];
    state.currentTheme = next;
    localStorage.setItem('appTheme', next);
    render();
}

function startBannerSlideshow() {
    setInterval(() => {
        state.currentBannerIndex = (state.currentBannerIndex + 1) % APP_CONFIG.bannerImages.length;
        const img = document.getElementById('banner-slideshow');
        if (img) {
            img.style.opacity = '0';
            setTimeout(() => {
                img.src = APP_CONFIG.bannerImages[state.currentBannerIndex];
                img.style.opacity = '1';
            }, 500);
        }
    }, 8000);
}

// --- RENDER FUNCTIONS ---

function renderHeader() {
    return `
        <header class="sticky top-0 z-50 border-b backdrop-blur-md">
            <div class="flex items-center justify-between px-4 py-3">
                <div class="flex items-center gap-3">
                    <button onclick="location.reload()" class="p-2 input-bg rounded-xl">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <h1 class="text-2xl font-black tracking-tight leading-tight">${APP_CONFIG.appTitle}</h1>
                </div>
                <button onclick="cycleTheme()" class="p-3 input-bg rounded-full shadow-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
                    </svg>
                </button>
            </div>
            <div class="px-4 pb-3">
                <div class="input-bg rounded-xl flex items-center px-4 h-12">
                    <input type="search" value="${state.searchTerm}" oninput="state.searchTerm=this.value" onkeypress="if(event.key === 'Enter') executeSearch()" placeholder="Card name or number..." class="w-full bg-transparent border-none outline-none font-medium placeholder:opacity-50" />
                </div>
            </div>
            <div class="flex gap-2 px-4 pb-4">
                <div class="fixed-dropdown-container input-bg rounded-lg px-3 border border-transparent">
                    <select onchange="state.selectedSet=this.value; executeSearch();">
                        <option value="">Set...</option>
                        ${state.sets.map(s => `<option value="${s.name}" ${state.selectedSet === s.name ? 'selected' : ''}>${s.name}</option>`).join('')}
                    </select>
                </div>
                <div class="fixed-dropdown-container input-bg rounded-lg px-3 border border-transparent">
                    <select onchange="state.selectedRarity=this.value; executeSearch();">
                        <option value="">Rarity...</option>
                        ${state.rarities.map(r => `<option value="${r}" ${state.selectedRarity === r ? 'selected' : ''}>${r}</option>`).join('')}
                    </select>
                </div>
            </div>
        </header>
    `;
}

function renderMain() {
    if (state.view === 'details') return renderDetails();
    if (state.view === 'list') return renderList();

    let content = '';
    if (state.showAd) {
        content += `
            <div class="px-4 pt-4">
                <div class="card-bg w-full aspect-[4/3] rounded-2xl overflow-hidden shadow-xl border mb-4">
                    <img id="banner-slideshow" src="${APP_CONFIG.bannerImages[state.currentBannerIndex]}" class="w-full h-full object-cover" />
                </div>
            </div>
            <div class="px-4 pb-4 flex justify-around items-center">
                ${['TikTok', 'Facebook', 'WhatsApp', 'Web'].map(name => `<div class="flex flex-col items-center gap-1"><div class="w-14 h-14 rounded-full input-bg flex items-center justify-center text-xl">📱</div><span class="text-[10px] font-bold opacity-60 uppercase">${name}</span></div>`).join('')}
            </div>
            <div class="px-4 pb-4">
                <a href="${APP_CONFIG.storeUrl}" class="block card-bg p-4 rounded-2xl border shadow-sm">
                    <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Advertisement</span>
                    <h3 class="font-bold mt-1">${APP_CONFIG.adTitle}</h3>
                    <p class="text-xs text-secondary">${APP_CONFIG.adDescription}</p>
                </a>
            </div>
        `;
    }

    if (state.isLoading) {
        content += `<div class="text-center py-20 opacity-50 font-bold">Searching Archive...</div>`;
    } else {
        content += `
            <div class="grid grid-cols-2 gap-4 p-4 pb-32">
                ${state.cards.map((card, i) => `
                    <div onclick="showCard(${i})" class="card-bg rounded-2xl p-3 shadow-md border text-left">
                        <div class="aspect-[1/1.4] input-bg rounded-xl mb-2 flex items-center justify-center overflow-hidden">
                            <img src="${card.images.small}" class="max-w-[90%] max-h-[90%] object-contain" />
                        </div>
                        <h3 class="font-bold text-sm line-clamp-2">${card.name}</h3>
                        <p class="text-[10px] text-secondary mt-1 uppercase font-bold">${card.set.name} (${getFullCardCode(card)})</p>
                    </div>
                `).join('')}
            </div>
        `;
    }
    return content;
}

function renderDetails() {
    const card = state.selectedCard;
    const code = getFullCardCode(card);
    const ebayLink = `https://www.ebay.co.uk/sch/i.html?_from=R40&_nkw=${encodeURIComponent(card.name + ' ' + code + ' sold')}&LH_Sold=1&LH_Complete=1`;
    
    return `
        <div class="p-4">
            <button onclick="state.view='search'; render();" class="font-bold text-secondary mb-4">← Back</button>
            <div class="card-bg rounded-3xl p-6 shadow-2xl border">
                <img src="${card.images.large}" class="w-full rounded-2xl mb-6 shadow-xl" />
                <h1 class="text-2xl font-black text-center">${card.name}</h1>
                <p class="text-center text-secondary mb-6">${card.set.name} • ${code}</p>
                
                ${Object.entries(card.tcgplayer?.prices || {}).map(([type, data]) => {
                    const price = formatPrice(data.market);
                    return `
                        <div class="input-bg rounded-2xl p-5 mb-4 border border-white/5">
                            <div class="text-xs font-bold opacity-50 uppercase text-center mb-1">${type} Market Guide</div>
                            <div class="text-4xl font-black text-center text-blue-500 mb-4">${price}</div>
                            <button onclick="addToList('${type}', '${price}')" class="w-full h-14 rounded-xl font-bold bg-green-500 text-white shadow-lg mb-3">Add to Inquiry List</button>
                            <a href="${ebayLink}" target="_blank" class="w-full h-12 rounded-xl border-2 border-blue-500 flex items-center justify-center gap-2 text-blue-500 font-bold italic text-sm">
                                View Sold Prices on eBay
                            </a>
                        </div>
                    `;
                }).join('')}
            </div>
        </div>
    `;
}

function showCard(index) {
    state.selectedCard = state.cards[index];
    state.view = 'details';
    window.scrollTo(0,0);
    render();
}

function addToList(type, price) {
    state.shoppingList.push({
        name: state.selectedCard.name,
        code: getFullCardCode(state.selectedCard),
        type,
        price
    });
    localStorage.setItem('tcgInquiryList', JSON.stringify(state.shoppingList));
    render();
}

function render() {
    const app = document.getElementById('app');
    document.documentElement.className = state.currentTheme;
    app.innerHTML = renderHeader() + renderMain();
}

initApp();
</script>
</body>
</html>
