<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repair Admin Dashboard | Essex Console Repair</title>
    
    <!-- Bootstrap & Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --primary-glow: #00d4ff; 
            --dark-bg: #0f0f0f; 
            --card-bg: #141414;
        }
        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            font-family: 'Roboto', sans-serif; 
            padding: 30px 0;
        }
        h1, h2, th { 
            font-family: 'Orbitron', sans-serif; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        .glow-text { 
            color: var(--primary-glow); 
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.4); 
        }
        .dashboard-card {
            background: linear-gradient(145deg, #141414 0%, #0b0b0b 100%);
            border: 1px solid #222;
            border-top: 3px solid var(--primary-glow);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .table {
            color: #fff;
            vertical-align: middle;
        }
        .table th {
            border-bottom: 2px solid #333;
            color: var(--primary-glow);
            font-size: 0.85rem;
        }
        .table td {
            border-bottom: 1px solid #222;
            padding: 15px 10px;
            background-color: transparent !important;
            color: #fff !important;
        }
        .badge-slot {
            background-color: #222;
            border: 1px solid #444;
            color: #ddd;
            font-weight: normal;
            font-size: 0.8rem;
        }
        .btn-refresh {
            border: 1px solid var(--primary-glow);
            color: var(--primary-glow);
            background: transparent;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s;
        }
        .btn-refresh:hover {
            background: var(--primary-glow);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }
    </style>
</head>
<body>

<div class="container-fluid px-4">
    <div class="row">
        <div class="col-12">
            
            <!-- Dashboard Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 fw-bold m-0">Essex <span class="glow-text">Console</span> Repair</h1>
                    <p class="text-muted small m-0">Secure Jobs & Bookings Ledger</p>
                </div>
                <button onclick="fetchBookings()" class="btn btn-refresh btn-sm px-3 py-2">
                    <i class="fas fa-sync-alt me-1"></i> Refresh List
                </button>
            </div>

            <!-- Main Data Card -->
            <div class="dashboard-card">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Date Scheduled</th>
                                <th>Time Window</th>
                                <th>Client Details</th>
                                <th>Hardware</th>
                                <th>Logged Issue</th>
                                <th>Address</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsTableBody">
                            <tr>
                                <td colspan="6" class="text-center py-5 text-muted">
                                    <i class="fas fa-spinner fa-spin fa-2x mb-2 text-info"></i><br>
                                    Loading active system bookings...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://fujfaeibxjlhpledjbky.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LxitdT1qAn2FtJwf-EY_Ng_gvmjSY4V";

    async function fetchBookings() {
        const tableBody = document.getElementById("bookingsTableBody");
        
        try {
            // Fetch records from Supabase
            const response = await fetch(`${SUPABASE_URL}/rest/v1/bookings?select=*`, {
                method: "GET",
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`
                }
            });

            if (!response.ok) throw new Error("Database network reject response");
            const bookings = await response.json();

            if (bookings.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">No active booking slots filled yet.</td></tr>`;
                return;
            }

            // BULLETPROOF SORT ENGINE: Chronologically processes database layouts (YYYY-MM-DD) and string values (DD/MM/YYYY)
            bookings.sort((a, b) => {
                const cleanDate = (dateStr) => {
                    if (!dateStr) return new Date(0);
                    if (dateStr.includes('-')) return new Date(dateStr); 
                    if (dateStr.includes('/')) { 
                        const [d, m, y] = dateStr.split('/');
                        return new Date(`${y}-${m}-${d}`);
                    }
                    return new Date(0);
                };
                return cleanDate(a.job_date) - cleanDate(b.job_date);
            });

            tableBody.innerHTML = "";

            // Build dynamic display rows
            bookings.forEach(job => {
                let displayDate = job.job_date || "No Date Specified";
                
                // Safely convert YYYY-MM-DD from database structure into clean UK visual layout (DD/MM/YYYY)
                if (job.job_date && job.job_date.includes('-')) {
                    const [y, m, d] = job.job_date.split('-');
                    displayDate = `${d}/${m}/${y}`;
                }

                const row = document.createElement("tr");
                
                row.innerHTML = `
                    <td class="fw-bold text-info">${escapeHTML(displayDate)}</td>
                    <td><span class="badge badge-slot">${escapeHTML(job.time_slot)}</span></td>
                    <td>
                        <div class="fw-bold">${escapeHTML(job.name)}</div>
                        <div class="small text-muted"><i class="fas fa-phone alt small me-1"></i>${escapeHTML(job.phone)}</div>
                    </td>
                    <td><span class="text-uppercase small fw-bold">${escapeHTML(job.console)}</span></td>
                    <td class="small text-wrap" style="max-width: 200px;">${escapeHTML(job.issue)}</td>
                    <td class="small text-muted">${escapeHTML(job.address)}</td>
                `;
                
                tableBody.appendChild(row);
            });

        } catch (err) {
            console.error("Dashboard Sync Error: ", err);
            tableBody.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4"><i class="fas fa-exclamation-triangle me-2"></i> Failed to synchronize database ledger. Check connection status or server logs.</td></tr>`;
        }
    }

    // Protection layout helper to isolate string output safety 
    function escapeHTML(str) {
        if (!str) return '';
        return str.replace(/[&<>'"]/g, 
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }

    // Fire automatically on initial window load sequence
    document.addEventListener("DOMContentLoaded", fetchBookings);
</script>

</body>
</html>
