<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokémon Price App</title>

<style>
    :root {
        --accent: #4f8cff;
        --bg: #eef1f5;
        --card-bg: #ffffff;
        --radius: 20px;
        --shadow: 0 6px 14px rgba(0,0,0,0.12);
        --big-text: 22px;
        --medium-text: 18px;
        --small-text: 16px;
    }

    body {
        font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        margin: 0;
        padding: 0;
    }

    /* APP HEADER */
    .app-header {
        position: sticky;
        top: 0;
        background: var(--card-bg);
        padding: 22px 20px;
        font-size: 26px;
        font-weight: 800;
        text-align: center;
        box-shadow: var(--shadow);
        z-index: 10;
        color: #222;
        letter-spacing: 0.5px;
    }

    /* SEARCH BAR */
    #searchBox {
        width: calc(100% - 40px);
        margin: 20px;
        padding: 18px;
        font-size: var(--medium-text);
        border-radius: var(--radius);
        border: none;
        box-shadow: var(--shadow);
        background: var(--card-bg);
    }

    /* FILTERS */
    #filters {
        display: flex;
        gap: 12px;
        padding: 0 20px;
        flex-wrap: wrap;
    }

    #filters select {
        flex: 1;
        min-width: 150px;
        padding: 16px;
        font-size: var(--medium-text);
        border-radius: var(--radius);
        border: none;
        background: var(--card-bg);
        box-shadow: var(--shadow);
    }

    /* CARD GRID */
    #results {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .card {
        background: var(--card-bg);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: var(--shadow);
        text-align: center;
        transition: 0.2s;
    }

    .card:hover {
        transform: scale(1.03);
    }

    .card img {
        width: 100%;
        border-radius: var(--radius);
    }

    .card h3 {
        font-size: var(--medium-text);
        margin: 12px 0 6px;
        color: #222;
        font-weight: 700;
    }

    .card p {
        font-size: var(--small-text);
        color: #666;
        margin: 0;
    }

    /* DETAILS PANEL */
    #details {
        background: var(--card-bg);
        margin: 20px;
        padding: 22px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
    }

    #details img {
        width: 100%;
        border-radius: var(--radius);
        margin-bottom: 20px;
    }

    .info-block {
        background: #f7f9fa;
        padding: 18px;
        border-radius: var(--radius);
        margin-bottom: 18px;
        border: 1px solid #e5e5ea;
    }

    .info-title {
        font-size: var(--medium-text);
        font-weight: 700;
        margin-bottom: 6px;
        color: #444;
    }

    .info-value {
        font-size: 26px;
        font-weight: 800;
        color: var(--accent);
    }

    .variant-title {
        font-size: 22px;
        font-weight: 800;
        margin-top: 28px;
        margin-bottom: 12px;
        color: #222;
    }

    @media (max-width: 600px) {
        .card h3 { font-size: 18px; }
        .card p { font-size: 15px; }
        .info-value { font-size: 24px; }
    }
</style>
</head>
<body>

<div class="app-header">Pokémon Price App</div>

<input id="searchBox" type="text" placeholder="Loading GBP rate..." disabled>

<div id="filters">
    <select id="setFilter"><option value="">All Sets</option></select>
    <select id="rarityFilter"><option value="">All Rarities</option></select>
</div>

<div id="results"></div>
<div id="details"></div>

<script>
const API_URL = "https://api.pokemontcg.io/v2/cards";
let GBP_RATE = null;
let allCards = [];

/* Load GBP rate */
async function init() {
    await loadGBP();
    document.getElementById("searchBox").disabled = false;
    document.getElementById("searchBox").placeholder = "Search cards...";
}

async function loadGBP() {
    try {
        const fx = await fetch("https://open.er-api.com/v6/latest/USD");
        const data = await fx.json();
        GBP_RATE = data.rates.GBP;
    } catch {
        GBP_RATE = null;
    }
}

function usdToGbp(usd) {
    if (!usd || !GBP_RATE) return "£—";
    return "£" + (usd * GBP_RATE).toFixed(2);
}

/* Search */
document.getElementById("searchBox").addEventListener("keyup", async function(e) {
    if (!GBP_RATE) return;

    const query = e.target.value.trim();
    if (query.length < 2) return;

    let q = query.includes("/")
        ? `number:${query.split("/")[0]} AND set.printedTotal:${query.split("/")[1]}`
        : `name:${query}*`;

    const res = await fetch(`${API_URL}?q=${encodeURIComponent(q)}`);
    const data = await res.json();

    allCards = data.data || [];
    populateFilters();
    renderResults();
});

/* Filters */
function populateFilters() {
    const setFilter = document.getElementById("setFilter");
    const rarityFilter = document.getElementById("rarityFilter");

    const sets = [...new Set(allCards.map(c => c.set.name))].sort();
    const rarities = [...new Set(allCards.map(c => c.rarity || "Unknown"))].sort();

    setFilter.innerHTML = `<option value="">All Sets</option>`;
    rarityFilter.innerHTML = `<option value="">All Rarities</option>`;

    sets.forEach(s => setFilter.innerHTML += `<option value="${s}">${s}</option>`);
    rarities.forEach(r => rarityFilter.innerHTML += `<option value="${r}">${r}</option>`);
}

document.getElementById("setFilter").addEventListener("change", renderResults);
document.getElementById("rarityFilter").addEventListener("change", renderResults);

/* Results grid */
function renderResults() {
    const setValue = document.getElementById("setFilter").value;
    const rarityValue = document.getElementById("rarityFilter").value;

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    let filtered = allCards;

    if (setValue) filtered = filtered.filter(c => c.set.name === setValue);
    if (rarityValue) filtered = filtered.filter(c => (c.rarity || "Unknown") === rarityValue);

    filtered.forEach(card => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <img src="${card.images.small}">
            <h3>${card.name}</h3>
            <p>${card.set.name}</p>
        `;
        div.onclick = () => showDetails(card);
        resultsDiv.appendChild(div);
    });
}

/* Details panel */
function showDetails(card) {
    const details = document.getElementById("details");

    const prices = card.tcgplayer?.prices || {};
    let variantsHtml = "";

    for (const variantName in prices) {
        const market = prices[variantName].market;
        if (!market) continue;

        variantsHtml += `
            <div class="variant-title">${variantName}</div>
            <div class="info-block">
                <div class="info-title">Market Price</div>
                <div class="info-value">${usdToGbp(market)}</div>
                <div style="font-size:15px;color:#666;margin-top:4px;">Source: TCGplayer</div>
            </div>
        `;
    }

    if (!variantsHtml) variantsHtml = "<p>No market pricing available.</p>";

    details.innerHTML = `
        <img src="${card.images.large}">
        <h2 style="font-size:26px;font-weight:800;margin-bottom:10px;">${card.name}</h2>
        <p style="font-size:18px;"><strong>Set:</strong> ${card.set.name}</p>
        <p style="font-size:18px;"><strong>Number:</strong> ${card.number}</p>
        <p style="font-size:18px;"><strong>Rarity:</strong> ${card.rarity ?? "Unknown"}</p>

        <h3 style="margin-top:30px;font-size:24px;font-weight:800;">Market Prices (GBP)</h3>
        ${variantsHtml}
    `;
}

init();
</script>

</body>
</html>
