<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Card Inquiry Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #007AFF;
            --primary-muted: rgba(0, 122, 255, 0.08);
            --bg: #F8F9FB;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-secondary: #8E8E93;
            --accent: #5856D6;
            --whatsapp-green: #25D366;
            --safe-area-top: env(safe-area-inset-top);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        .header-stack {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-top: var(--safe-area-top);
        }

        .brand-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px 8px;
        }

        .header-logo {
            height: 28px;
            width: auto;
            object-fit: contain;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .search-container {
            padding: 0 16px 12px;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        #searchBox {
            width: 100%;
            padding: 10px 10px 10px 36px;
            border-radius: 10px;
            border: none;
            background: rgba(0,0,0,0.05);
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        #searchBox:focus {
            background: rgba(0,0,0,0.08);
            box-shadow: 0 0 0 2px var(--primary);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .filter-row {
            display: flex;
            gap: 6px;
            padding: 0 16px 12px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filter-row::-webkit-scrollbar { display: none; }

        select {
            appearance: none;
            background: #fff;
            border: 1px solid #E5E5EA;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-main);
            min-width: 90px;
            cursor: pointer;
        }

        /* COMPACT RESULTS GRID */
        #results {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 12px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .card:active { transform: scale(0.96); }

        .card img {
            width: 100%;
            aspect-ratio: 1 / 1.4; /* Slightly tighter aspect ratio */
            object-fit: contain;
            background: #fdfdfd;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .card-info h3 {
            font-size: 13px;
            line-height: 1.2;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-info p {
            font-size: 11px;
            color: var(--text-secondary);
            margin: 2px 0 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #details {
            margin: 16px;
            padding: 20px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
            animation: slideUp 0.3s ease-out;
            margin-bottom: 40px;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .details-hero {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .variant-card {
            background: var(--bg);
            border-radius: 16px;
            padding: 16px;
            margin-top: 12px;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .price-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;}
        .price-value { font-size: 26px; font-weight: 900; color: var(--primary); margin: 4px 0 12px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:active { transform: scale(0.97); }

        .btn-whatsapp { background: var(--whatsapp-green); color: white; }
        
        .btn-back {
            background: var(--primary-muted);
            color: var(--primary);
            margin-top: 20px;
        }

        .loader { text-align: center; padding: 40px; color: var(--text-secondary); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="appHeader" class="header-stack">
        <div class="brand-bar">
            <img class="header-logo" src="https://files.websitebuilder.prositehosting.co.uk/8b/e9/8be9aecf-cb17-445e-b11b-3ec60a27c26d.png" alt="Logo">
            <div class="header-title">Market Inquiry</div>
            <div style="width: 32px"></div> 
        </div>

        <div class="search-container">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input id="searchBox" type="text" placeholder="Loading exchange rates..." disabled>
            </div>
        </div>

        <div id="filters" class="filter-row">
            <select id="setFilter"><option value="">All Sets</option></select>
            <select id="rarityFilter"><option value="">All Rarities</option></select>
        </div>
    </div>

    <div id="results"></div>
    <div id="details"></div>
</div>

<script>
const API_URL = "https://api.pokemontcg.io/v2/cards";
let GBP_RATE = null;
let allCards = [];

async function init() {
    await loadGBP();
    const sb = document.getElementById("searchBox");
    sb.disabled = false;
    sb.placeholder = "Search card name...";
}

async function loadGBP() {
    const FALLBACK = 0.78;
    try {
        const fx = await fetch("https://open.er-api.com/v6/latest/USD");
        const data = await fx.json();
        GBP_RATE = data.rates.GBP || FALLBACK;
    } catch {
        GBP_RATE = FALLBACK;
    }
}

function usdToGbp(usd) {
    if (!usd || !GBP_RATE) return 0;
    return (usd * GBP_RATE);
}

document.getElementById("searchBox").addEventListener("keyup", debounce(async function(e) {
    const query = e.target.value.trim();
    if (query.length < 3) return;

    document.getElementById("results").innerHTML = '<div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Searching...</div>';
    
    let q = query.includes("/")
        ? `number:${query.split("/")[0]} AND set.printedTotal:${query.split("/")[1]}`
        : `name:"${query}*"`;

    try {
        const res = await fetch(`${API_URL}?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        allCards = data.data || [];
        populateFilters();
        renderResults();
    } catch (err) {
        console.error(err);
    }
}, 500));

function populateFilters() {
    const setFilter = document.getElementById("setFilter");
    const rarityFilter = document.getElementById("rarityFilter");
    const sets = [...new Set(allCards.map(c => c.set.name))].sort();
    const rarities = [...new Set(allCards.map(c => c.rarity || "Unknown"))].sort();

    setFilter.innerHTML = `<option value="">All Sets</option>` + sets.map(s => `<option value="${s}">${s}</option>`).join('');
    rarityFilter.innerHTML = `<option value="">All Rarities</option>` + rarities.map(r => `<option value="${r}">${r}</option>`).join('');
}

document.getElementById("setFilter").addEventListener("change", renderResults);
document.getElementById("rarityFilter").addEventListener("change", renderResults);

function renderResults() {
    const resultsDiv = document.getElementById("results");
    const detailsDiv = document.getElementById("details");
    const header = document.getElementById("appHeader");
    
    detailsDiv.style.display = "none";
    resultsDiv.style.display = "grid";
    header.style.display = "block";

    const setValue = document.getElementById("setFilter").value;
    const rarityValue = document.getElementById("rarityFilter").value;
    resultsDiv.innerHTML = "";

    let filtered = allCards;
    if (setValue) filtered = filtered.filter(c => c.set.name === setValue);
    if (rarityValue) filtered = filtered.filter(c => (c.rarity || "Unknown") === rarityValue);

    if (filtered.length === 0) {
        resultsDiv.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#888;">No cards found.</div>';
        return;
    }

    filtered.forEach(card => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <img src="${card.images.small}" loading="lazy">
            <div class="card-info">
                <h3>${card.name}</h3>
                <p>${card.set.name}</p>
            </div>
        `;
        div.onclick = () => showDetails(card);
        resultsDiv.appendChild(div);
    });
}

function showDetails(card) {
    const details = document.getElementById("details");
    const results = document.getElementById("results");
    const header = document.getElementById("appHeader");

    results.style.display = "none"; 
    header.style.display = "none"; 
    
    const prices = card.tcgplayer?.prices || {};
    let variantsHtml = "";
    const MARKUP = 0.10;

    for (const variant in prices) {
        const market = prices[variant].market;
        if (!market) continue;

        let gbpNum = usdToGbp(market);
        let finalPrice = "£" + (gbpNum * (1 + MARKUP)).toFixed(2);

        const waMessage = encodeURIComponent(
`Hi Dave, I am interested to know if you have this card.

Card: ${card.name}
Variant: ${variant}
Card Number: ${card.number}
Set: ${card.set.name}
Image: ${card.images.large}

I understand the price of ${finalPrice} is a guide and was wondering what's the best you can do on it if you have it.`
        );

        variantsHtml += `
            <div class="variant-card">
                <div class="price-label">${variant} Market Guide</div>
                <div class="price-value">${finalPrice}</div>
                <a class="btn btn-whatsapp" href="https://wa.me/447483251962?text=${waMessage}">
                    <i class="fa-brands fa-whatsapp"></i> Message on WhatsApp
                </a>
            </div>
        `;
    }

    details.innerHTML = `
        <img class="details-hero" src="${card.images.large}">
        <h2 style="margin:0 0 5px 0; font-size:24px;">${card.name}</h2>
        <div style="display:flex; gap:10px; margin-bottom:20px; color:var(--text-secondary); font-size:13px; font-weight:600;">
            <span>${card.set.name}</span> • <span>${card.number}</span>
        </div>
        ${variantsHtml || '<p>No pricing available for this card.</p>'}
        <button class="btn btn-back" onclick="closeDetails()">
            <i class="fa-solid fa-chevron-left"></i> Back to Results
        </button>
    `;

    details.style.display = "block";
    window.scrollTo({ top: 0, behavior: "smooth" });
}

function closeDetails() {
    const details = document.getElementById("details");
    const results = document.getElementById("results");
    const header = document.getElementById("appHeader");

    details.style.display = "none";
    results.style.display = "grid";
    header.style.display = "block";
    window.scrollTo({ top: 0, behavior: "auto" });
}

function debounce(func, timeout = 300){
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => { func.apply(this, args); }, timeout);
  };
}

init();
</script>
</body>
</html>
