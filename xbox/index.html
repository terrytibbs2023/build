<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Card Inquiry Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #007AFF;
            --primary-muted: rgba(0, 122, 255, 0.08);
            --bg: #F8F9FB;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-secondary: #8E8E93;
            --whatsapp-green: #25D366;
            --safe-area-top: env(safe-area-inset-top);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            width: 100%;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .header-stack {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-top: var(--safe-area-top);
        }

        .brand-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px 8px;
        }

        .header-logo { height: 24px; width: auto; }
        .header-title { font-size: 16px; font-weight: 700; }

        .search-container { padding: 0 12px 12px; }
        .search-wrapper { position: relative; display: flex; align-items: center; }

        #searchBox {
            width: 100%;
            padding: 10px 10px 10px 36px;
            border-radius: 10px;
            border: none;
            background: rgba(0,0,0,0.06);
            font-size: 16px;
            outline: none;
        }

        .search-icon { position: absolute; left: 12px; color: var(--text-secondary); }

        .filter-row { display: flex; gap: 6px; padding: 0 12px 12px; overflow-x: auto; }
        select {
            appearance: none;
            background: #fff;
            border: 1px solid #E5E5EA;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        #results {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: 1fr;
            gap: 12px;
            padding: 12px;
            width: 100%;
            /* Fixes some mobile-specific grid rendering bugs */
            grid-auto-flow: row dense; 
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            width: 100%;
            cursor: pointer;
            height: 100%;
            contain: paint; /* Performance boost for mobile grid */
        }

        .card-img-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1.35;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            background: #fdfdfd;
            border-radius: 6px;
            overflow: hidden;
        }

        .card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            min-width: 0;
        }

        .card-info h3 {
            font-size: 13px;
            line-height: 1.3;
            margin: 0;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-info p {
            font-size: 11px;
            color: var(--text-secondary);
            margin: 5px 0 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loader-container {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            color: var(--text-secondary);
        }

        .loader-container i {
            font-size: 32px;
            color: var(--primary);
            margin-bottom: 12px;
        }

        #details {
            margin: 12px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .details-hero { width: 100%; border-radius: 12px; margin-bottom: 15px; }

        .variant-card {
            background: var(--bg);
            border-radius: 14px;
            padding: 15px;
            margin-top: 10px;
        }

        .price-value { font-size: 24px; font-weight: 800; color: var(--primary); margin: 4px 0 10px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-whatsapp { background: var(--whatsapp-green); color: white; }
        .btn-back { background: var(--primary-muted); color: var(--primary); margin-top: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="appHeader" class="header-stack">
        <div class="brand-bar">
            <img class="header-logo" src="https://files.websitebuilder.prositehosting.co.uk/8b/e9/8be9aecf-cb17-445e-b11b-3ec60a27c26d.png" alt="Logo">
            <div class="header-title">Market Inquiry</div>
            <div style="width: 26px"></div> 
        </div>

        <div class="search-container">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input id="searchBox" type="text" placeholder="Loading rates..." disabled>
            </div>
        </div>

        <div id="filters" class="filter-row">
            <select id="setFilter"><option value="">All Sets</option></select>
            <select id="rarityFilter"><option value="">All Rarities</option></select>
        </div>
    </div>

    <div id="results"></div>
    <div id="details"></div>
</div>

<script>
const API_URL = "https://api.pokemontcg.io/v2/cards";
let GBP_RATE = null;
let allCards = [];

async function init() {
    await loadGBP();
    const sb = document.getElementById("searchBox");
    sb.disabled = false;
    sb.placeholder = "Search card name...";
}

async function loadGBP() {
    try {
        const fx = await fetch("https://open.er-api.com/v6/latest/USD");
        const data = await fx.json();
        GBP_RATE = data.rates.GBP || 0.78;
    } catch { GBP_RATE = 0.78; }
}

function usdToGbp(usd) { return usd * GBP_RATE; }

document.getElementById("searchBox").addEventListener("keyup", debounce(async function(e) {
    const query = e.target.value.trim();
    if (query.length < 3) return;

    document.getElementById("results").innerHTML = `
        <div class="loader-container">
            <i class="fa-solid fa-spinner fa-spin"></i>
            <div>Searching...</div>
        </div>`;
    
    let q = query.includes("/")
        ? `number:${query.split("/")[0]} AND set.printedTotal:${query.split("/")[1]}`
        : `name:"${query}*"`;

    try {
        const res = await fetch(`${API_URL}?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        allCards = data.data || [];
        populateFilters();
        renderResults();
    } catch (err) { console.error(err); }
}, 500));

function populateFilters() {
    const setFilter = document.getElementById("setFilter");
    const rarityFilter = document.getElementById("rarityFilter");
    const sets = [...new Set(allCards.map(c => c.set.name))].sort();
    const rarities = [...new Set(allCards.map(c => c.rarity || "Unknown"))].sort();

    setFilter.innerHTML = `<option value="">All Sets</option>` + sets.map(s => `<option value="${s}">${s}</option>`).join('');
    rarityFilter.innerHTML = `<option value="">All Rarities</option>` + rarities.map(r => `<option value="${r}">${r}</option>`).join('');
}

document.getElementById("setFilter").addEventListener("change", renderResults);
document.getElementById("rarityFilter").addEventListener("change", renderResults);

function renderResults() {
    const resultsDiv = document.getElementById("results");
    const detailsDiv = document.getElementById("details");
    const header = document.getElementById("appHeader");
    
    detailsDiv.style.display = "none";
    resultsDiv.style.display = "grid";
    header.style.display = "block";

    const setValue = document.getElementById("setFilter").value;
    const rarityValue = document.getElementById("rarityFilter").value;
    resultsDiv.innerHTML = "";

    let filtered = allCards;
    if (setValue) filtered = filtered.filter(c => c.set.name === setValue);
    if (rarityValue) filtered = filtered.filter(c => (c.rarity || "Unknown") === rarityValue);

    if (filtered.length === 0) {
        resultsDiv.innerHTML = '<div class="loader-container">No cards found.</div>';
        return;
    }

    // RENDER CARDS
    filtered.forEach(card => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <div class="card-img-wrapper"><img src="${card.images.small}" loading="lazy"></div>
            <div class="card-info">
                <h3>${card.name}</h3>
                <p>${card.set.name}</p>
            </div>
        `;
        div.onclick = () => showDetails(card);
        resultsDiv.appendChild(div);
    });

    // INLINE REFRESH LOGIC
    // requestAnimationFrame forces the browser to calculate the layout 
    // immediately after the cards are added to the DOM.
    requestAnimationFrame(() => {
        resultsDiv.style.display = 'none';
        resultsDiv.offsetHeight; // Force a "reflow"
        resultsDiv.style.display = 'grid';
        window.scrollTo({ top: 0, behavior: 'auto' });
    });
}

function showDetails(card) {
    const details = document.getElementById("details");
    const results = document.getElementById("results");
    const header = document.getElementById("appHeader");

    results.style.display = "none"; 
    header.style.display = "none"; 
    
    const prices = card.tcgplayer?.prices || {};
    let variantsHtml = "";
    const MARKUP = 0.10;

    for (const variant in prices) {
        const market = prices[variant].market;
        if (!market) continue;

        let gbpNum = usdToGbp(market);
        let finalPrice = "£" + (gbpNum * (1 + MARKUP)).toFixed(2);

        const waMessage = encodeURIComponent(
`Hi Dave, I am interested to know if you have this card.

Card: ${card.name}
Variant: ${variant}
Card Number: ${card.number}
Set: ${card.set.name}
Image: ${card.images.large}

I understand the guide price of ${finalPrice} is a guide and was wondering what's the best you can do on it if you have it.`
        );

        variantsHtml += `
            <div class="variant-card">
                <div style="font-size:11px; font-weight:700; color:var(--text-secondary); text-transform:uppercase;">${variant} Market Guide</div>
                <div class="price-value">${finalPrice}</div>
                <a class="btn btn-whatsapp" href="https://wa.me/447483251962?text=${waMessage}">
                    <i class="fa-brands fa-whatsapp"></i> Message on WhatsApp
                </a>
            </div>
        `;
    }

    details.innerHTML = `
        <img class="details-hero" src="${card.images.large}">
        <h2 style="margin:0; font-size:22px;">${card.name}</h2>
        <div style="margin-bottom:15px; color:var(--text-secondary); font-size:13px;">${card.set.name} • ${card.number}</div>
        ${variantsHtml || '<p>No pricing available.</p>'}
        <button class="btn btn-back" onclick="closeDetails()">
            <i class="fa-solid fa-chevron-left"></i> Back to Results
        </button>
    `;

    details.style.display = "block";
    window.scrollTo({ top: 0, behavior: "smooth" });
}

function closeDetails() {
    document.getElementById("details").style.display = "none";
    document.getElementById("results").style.display = "grid";
    document.getElementById("appHeader").style.display = "block";
    window.scrollTo({ top: 0, behavior: "auto" });
}

function debounce(func, timeout = 300){
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => { func.apply(this, args); }, timeout);
  };
}

init();
</script>
</body>
</html>
