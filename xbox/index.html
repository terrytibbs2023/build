<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Inquiry</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body {
    margin: 0;
    padding: 0;
    background: #F2F2F7;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Roboto", sans-serif;
}

.app-container {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    margin: 0 auto;
    background: #FFFFFF;
    box-shadow: 0 0 0 1px #E5E5EA;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    text-align: center;
    padding: 18px 16px 10px;
    background: #FFFFFF;
    position: sticky;
    top: 0;
    z-index: 20;
    box-shadow: 0 1px 0 rgba(0,0,0,0.08);
}

.header-title {
    font-size: 26px;
    font-weight: 800;
    color: #111;
    margin-bottom: 6px;
}

.header-logo {
    width: 120px;
    border-radius: 12px;
}

/* SEARCH */
#searchBox {
    width: calc(100% - 32px);
    margin: 14px 16px;
    padding: 14px;
    font-size: 18px;
    border-radius: 12px;
    border: 1px solid #D1D1D6;
    background: #F9F9FB;
}

/* FILTERS */
#filters {
    display: flex;
    gap: 10px;
    padding: 0 16px 8px;
}

#filters select {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #D1D1D6;
    background: #FFFFFF;
}

/* GRID */
#results {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px 16px 80px;
}

.card {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    transition: 0.15s;
}

.card:active {
    transform: scale(0.97);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h3 {
    font-size: 16px;
    margin: 6px 0 2px;
    font-weight: 700;
}

.card p {
    font-size: 13px;
    color: #666;
    margin: 0;
}

/* BOTTOM SHEET */
#details {
    position: fixed;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 430px;
    max-height: 80vh;
    background: #FFFFFF;
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.25);
    padding: 18px 16px 24px;
    overflow-y: auto;
    transition: 0.3s ease;
    z-index: 50;
}

#details.open {
    transform: translateX(-50%) translateY(0);
}

#details img {
    width: 100%;
    border-radius: 14px;
    margin-bottom: 14px;
}

.close-details {
    font-size: 26px;
    font-weight: 600;
    color: #444;
    text-align: right;
    padding: 4px 4px 10px;
    cursor: pointer;
}
.close-details:active {
    opacity: 0.5;
}

.details-title {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 4px;
}

.details-meta {
    font-size: 16px;
    margin: 2px 0;
}

/* VARIANTS */
.variant-title {
    font-size: 18px;
    font-weight: 800;
    margin-top: 16px;
}

.info-block {
    background: #F2F2F7;
    padding: 12px;
    border-radius: 12px;
    margin-top: 8px;
}

.info-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 2px;
}

.info-value {
    font-size: 22px;
    font-weight: 900;
    color: #007AFF;
}

/* BUTTON */
.sms-btn {
    width: 100%;
    margin-top: 10px;
    padding: 14px;
    font-size: 18px;
    font-weight: 800;
    background: #007AFF;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.15s;
}

.sms-btn:active {
    transform: scale(0.97);
}
</style>
</head>
<body>

<div class="app-container">

    <div class="header">
        <div class="header-title">Card Inquiry</div>
        <img class="header-logo" src="https://files.websitebuilder.prositehosting.co.uk/8b/e9/8be9aecf-cb17-445e-b11b-3ec60a27c26d.png">
    </div>

    <input id="searchBox" type="text" placeholder="Loading GBP rate..." disabled>

    <div id="filters">
        <select id="setFilter"><option value="">All Sets</option></select>
        <select id="rarityFilter"><option value="">All Rarities</option></select>
    </div>

    <div id="results"></div>
    <div id="details"></div>

</div>

<script>
const API_URL = "https://api.pokemontcg.io/v2/cards";
let GBP_RATE = null;
let allCards = [];

/* INIT */
async function init() {
    await loadGBP();
    const sb = document.getElementById("searchBox");
    sb.disabled = false;
    sb.placeholder = "Search cards...";
}

/* GBP LOADER */
async function loadGBP() {
    const FALLBACK = 0.78;

    const timeout = (ms) =>
        new Promise((_, reject) => setTimeout(() => reject("timeout"), ms));

    try {
        const fx = await Promise.race([
            fetch("https://api.exchangerate.host/latest?base=USD"),
            timeout(3000)
        ]);

        const data = await fx.json();
        GBP_RATE = data.rates.GBP || FALLBACK;
    } catch {
        GBP_RATE = FALLBACK;
    }
}

function usdToGbp(usd) {
    if (!usd || !GBP_RATE) return "£—";
    return "£" + (usd * GBP_RATE).toFixed(2);
}

/* SEARCH */
document.getElementById("searchBox").addEventListener("keyup", async function(e) {
    const query = e.target.value.trim();
    if (query.length < 2) return;

    let q = query.includes("/")
        ? `number:${query.split("/")[0]} AND set.printedTotal:${query.split("/")[1]}`
        : `name:${query}*`;

    const res = await fetch(`${API_URL}?q=${encodeURIComponent(q)}`);
    const data = await res.json();

    allCards = data.data || [];
    populateFilters();
    renderResults();
});

/* FILTERS */
function populateFilters() {
    const setFilter = document.getElementById("setFilter");
    const rarityFilter = document.getElementById("rarityFilter");

    const sets = [...new Set(allCards.map(c => c.set.name))].sort();
    const rarities = [...new Set(allCards.map(c => c.rarity || "Unknown"))].sort();

    setFilter.innerHTML = `<option value="">All Sets</option>`;
    rarityFilter.innerHTML = `<option value="">All Rarities</option>`;

    sets.forEach(s => setFilter.innerHTML += `<option value="${s}">${s}</option>`);
    rarities.forEach(r => rarityFilter.innerHTML += `<option value="${r}">${r}</option>`);
}

document.getElementById("setFilter").addEventListener("change", renderResults);
document.getElementById("rarityFilter").addEventListener("change", renderResults);

/* GRID */
function renderResults() {
    const setValue = document.getElementById("setFilter").value;
    const rarityValue = document.getElementById("rarityFilter").value;

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    let filtered = allCards;

    if (setValue) filtered = filtered.filter(c => c.set.name === setValue);
    if (rarityValue) filtered = filtered.filter(c => (c.rarity || "Unknown") === rarityValue);

    filtered.forEach(card => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <img src="${card.images.small}">
            <h3>${card.name}</h3>
            <p>${card.set.name}</p>
        `;
        div.onclick = () => showDetails(card);
        resultsDiv.appendChild(div);
    });
}

/* CLOSE DETAILS */
function closeDetails() {
    document.getElementById("details").classList.remove("open");
}

/* DETAILS PANEL */
function showDetails(card) {
    const details = document.getElementById("details");

    const prices = card.tcgplayer?.prices || {};
    let variantsHtml = "";

    const MARKUP = 0.10;

    for (const variant in prices) {
        const market = prices[variant].market;
        if (!market) continue;

        let gbp = usdToGbp(market);
        let adjusted = (parseFloat(gbp.replace("£","")) * (1 + MARKUP)).toFixed(2);
        let finalPrice = "£" + adjusted;

        const waMessage = encodeURIComponent(
`Hi Dave, I am interested to know if you have this card.

Card: ${card.name}
Variant: ${variant}
Card Number: ${card.number}
Set: ${card.set.name}
Image: ${card.images.large}

I understand the guide price of ${finalPrice} is a guide and was wondering what's the best you can do on it if you have it.`
        );

        variantsHtml += `
            <div class="variant-title">${variant}</div>
            <div class="info-block">
                <div class="info-title">Guide Price</div>
                <div class="info-value">${finalPrice}</div>
                <a href="https://wa.me/447483251962?text=${waMessage}">
                    <button class="sms-btn">Message on WhatsApp</button>
                </a>
            </div>
        `;
    }

    if (!variantsHtml) {
        variantsHtml = `<p style="margin-top:12px;font-size:16px;">No guide pricing available.</p>`;
    }

    details.innerHTML = `
        <div class="close-details" onclick="closeDetails()">✕</div>
        <img src="${card.images.large}">
        <div class="details-title">${card.name}</div>
        <p class="details-meta"><strong>Set:</strong> ${card.set.name}</p>
        <p class="details-meta"><strong>Number:</strong> ${card.number}</p>
        <p class="details-meta"><strong>Rarity:</strong> ${card.rarity ?? "Unknown"}</p>
        ${variantsHtml}
    `;

    details.classList.add("open");
}

init();
</script>

</body>
</html>
