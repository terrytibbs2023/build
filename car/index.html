<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Essex Console Repair - Mobile Portal</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Essex Console Repair</h1>
    
    <!-- Premium Pill-Style Toggle Switch -->
    <div class="toggle-switch-container">
      <button type="button" class="toggle-btn active" id="tabIntake">Book Intake</button>
      <button type="button" class="toggle-btn" id="tabAfterJob">After Job Report</button>
    </div>

    <!-- 1. INTAKE FORM -->
    <form id="repairForm" class="form-section active">
      <div class="form-group">
        <label for="takenInBy">Taken in By</label>
        <input type="text" id="takenInBy" placeholder="Your Name" required />
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="consoleMake">Console Make</label>
          <select id="consoleMake" required>
            <option value="">-- Select Make --</option>
            <option value="Sony">Sony</option>
            <option value="Microsoft">Microsoft</option>
            <option value="Nintendo">Nintendo</option>
            <option value="Other">Other</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="consoleModel">Console Model</label>
          <select id="consoleModel" required>
            <option value="">-- Select Model --</option>
            <option value="PlayStation 5">PlayStation 5</option>
            <option value="PlayStation 5 Pro">PlayStation 5 Pro</option>
            <option value="PlayStation 4">PlayStation 4</option>
            <option value="PlayStation 4 Pro">PlayStation 4 Pro</option>
            <option value="Xbox Series X">Xbox Series X</option>
            <option value="Xbox Series S">Xbox Series S</option>
            <option value="Xbox One X">Xbox One X</option>
            <option value="Xbox One S">Xbox One S</option>
            <option value="Switch OLED">Switch OLED</option>
            <option value="Switch Standard">Switch Standard</option>
            <option value="Switch Lite">Switch Lite</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Common Issues (Click to add)</label>
        <div class="tag-container" id="faultTags">
          <button type="button" class="tag-btn" data-fault="No Display">No Display</button>
          <button type="button" class="tag-btn" data-fault="No Power / Dead Console">No Power</button>
          <button type="button" class="tag-btn" data-fault="Overheating">Overheating</button>
          <button type="button" class="tag-btn" data-fault="Disc Drive Reading Fault">Disc Drive</button>
          <button type="button" class="tag-btn" data-fault="Controller Drift Repair">Stick Drift</button>
          <button type="button" class="tag-btn" data-fault="Not Charging">Charging Issues</button>
        </div>
      </div>
      
      <div class="form-group">
        <label for="issue">General Description of the Problem</label>
        <textarea id="issue" rows="4" placeholder="Describe the fault or details here..." required></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Generate & Download Intake PDF</button>
    </form>

    <!-- 2. AFTER JOB FORM -->
    <form id="afterJobForm" class="form-section">
      <div class="form-row">
        <div class="form-group">
          <label for="jobConsoleMake">Console Make</label>
          <select id="jobConsoleMake" required>
            <option value="">-- Select Make --</option>
            <option value="Sony">Sony</option>
            <option value="Microsoft">Microsoft</option>
            <option value="Nintendo">Nintendo</option>
            <option value="Other">Other</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="jobConsoleModel">Console Model</label>
          <select id="jobConsoleModel" required>
            <option value="">-- Select Model --</option>
            <option value="PlayStation 5">PlayStation 5</option>
            <option value="PlayStation 5 Pro">PlayStation 5 Pro</option>
            <option value="PlayStation 4">PlayStation 4</option>
            <option value="PlayStation 4 Pro">PlayStation 4 Pro</option>
            <option value="Xbox Series X">Xbox Series X</option>
            <option value="Xbox Series S">Xbox Series S</option>
            <option value="Xbox One X">Xbox One X</option>
            <option value="Xbox One S">Xbox One S</option>
            <option value="Switch OLED">Switch OLED</option>
            <option value="Switch Standard">Switch Standard</option>
            <option value="Switch Lite">Switch Lite</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="repairNotes">Repair Notes / Work Carried Out</label>
        <textarea id="repairNotes" rows="4" placeholder="Describe the fix, parts swapped, or testing results..." required></textarea>
      </div>

      <div class="form-group">
        <label>Job Media Documentation</label>
        <input type="file" id="jobPhotos" accept="image/*" multiple style="display: none;" />
        <button type="button" class="file-custom-btn" onclick="document.getElementById('jobPhotos').click()">
          📸 Add Photos from Phone
        </button>
        <div id="photoPreviewContainer" class="preview-grid"></div>
      </div>

      <button type="submit" class="submit-btn success-btn" id="jobSubmitBtn">Generate Completion PDF</button>
    </form>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
