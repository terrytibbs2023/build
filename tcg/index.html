<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ellis TCG Card Search</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#007AFF">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://imagecdn.websitebuilder.prositehosting.co.uk/22/3e/223ef076-9a2d-4062-98c2-25f95c7952d0.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #007AFF;
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #000000;
            --text-secondary: #8E8E93;
            --whatsapp: #25D366;
            --ebay: #0064D2;
            --header-bg: rgba(255, 255, 255, 0.85);
            --danger: #FF3B30;
            --disabled: #C7C7CC;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow-x: hidden; background-color: var(--bg); font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .app-container { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 100px; }
        
        /* HEADER */
        .app-header { position: sticky; top: 0; z-index: 1000; background: var(--header-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 1px solid rgba(0,0,0,0.08); padding: env(safe-area-inset-top) 0 16px; }
        .top-install-banner { display: none; padding: 12px 16px 0; }
        .btn-install-top { background: var(--primary); color: white; border-radius: 12px; height: 44px; font-size: 14px; font-weight: 700; width: 100%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(0,122,255,0.3); }

        .large-title { padding: 15px 20px 15px; font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .search-area { padding: 0 16px; margin-bottom: 15px; }
        .search-pill { position: relative; background: rgba(118, 118, 128, 0.12); border-radius: 12px; height: 46px; display: flex; align-items: center; padding: 0 16px; }
        .search-pill i { color: var(--text-secondary); font-size: 18px; margin-right: 12px; }
        .search-pill input { background: none; border: none; outline: none; width: 100%; font-size: 17px; color: var(--text-main); }

        /* GRID */
        .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 16px; width: 100%; }
        .card { background: var(--card-bg); border-radius: 18px; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; border: 1px solid rgba(0,0,0,0.03); cursor: pointer; }
        .card-img { width: 100%; aspect-ratio: 1 / 1.38; background: #F9F9FB; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-img img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .card-name { font-size: 14px; font-weight: 700; line-height: 1.25; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* DETAILS VIEW */
        #details-view { display: none; padding: 16px; }
        .details-card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .details-img { width: 100%; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .price-box { background: var(--bg); border-radius: 18px; padding: 20px; margin-top: 15px; border: 1px solid rgba(0,0,0,0.03); text-align: center; }
        .price-tag { font-size: 36px; font-weight: 800; color: var(--primary); margin: 4px 0 15px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; border-radius: 14px; font-weight: 700; text-decoration: none; border: none; cursor: pointer; transition: 0.2s; }
        .btn-wa { height: 54px; font-size: 16px; background: var(--whatsapp); color: white; }
        .btn-added { height: 54px; font-size: 16px; background: var(--disabled) !important; color: white !important; cursor: default; }
        .btn-back { height: 50px; background: rgba(0,0,0,0.06); color: var(--text-main); margin-top: 25px; font-size: 15px; }

        /* FLOATING CART BAR */
        .cart-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--text-main); color: white; height: 60px; border-radius: 30px; display: none; align-items: center; justify-content: space-between; padding: 0 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 2000; cursor: pointer; }
        .cart-count-badge { background: var(--primary); padding: 4px 10px; border-radius: 10px; font-size: 14px; }

        /* LIST MODAL */
        #list-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; padding: 20px; overflow-y: auto; }
        .list-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        .remove-btn { color: var(--danger); font-weight: 600; font-size: 14px; border: none; background: none; cursor: pointer; padding: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header" id="mainHeader">
        <div id="installBanner" class="top-install-banner">
            <button class="btn-install-top" onclick="triggerInstall()">
                <i class="fa-solid fa-circle-arrow-down"></i> Install Ellis TCG App
            </button>
        </div>
        <div id="ui-app-title" class="large-title">Ellis TCG Card Search</div>
        <div class="search-area">
            <div class="search-pill">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Loading...">
            </div>
        </div>
    </header>

    <div id="ad-container" style="padding:16px;">
        <div style="background: white; border-radius: 20px; overflow: hidden; border: 1px solid rgba(0,0,0,0.05);">
            <div style="background: #f9f9fb; height: 160px; display: flex; align-items: center; justify-content: center; padding: 20px;">
                <img id="ui-logo-ad" src="" style="max-width: 80%; max-height: 80%; object-fit: contain;">
            </div>
            <div style="padding: 20px;">
                <span style="color: var(--primary); font-size: 11px; font-weight: 800; text-transform: uppercase;">Official Sponsor</span>
                <div id="ui-ad-title" style="font-size: 20px; font-weight: 800; color: var(--text-main); margin: 6px 0;">Essex Console Repair</div>
            </div>
        </div>
    </div>

    <div id="results-view" class="card-grid"></div>
    <div id="details-view"></div>
</div>

<div class="cart-bar" id="cartBar" onclick="showList()">
    <span>View Inquiry List</span>
    <span class="cart-count-badge" id="cartCount">0</span>
</div>

<div id="list-modal">
    <h2 style="margin-bottom: 20px; font-size: 24px; font-weight: 800;">Your Inquiry List</h2>
    <div id="list-items-container"></div>
    <div style="margin-top: 30px;">
        <button class="btn btn-wa" onclick="sendFinalWhatsApp()"><i class="fa-brands fa-whatsapp"></i> Send List to WhatsApp</button>
        <button class="btn btn-back" onclick="handleBack()">Close & Continue Searching</button>
    </div>
</div>

<script>
const APP_CONFIG = {
    logoUrl: "https://imagecdn.websitebuilder.prositehosting.co.uk/22/3e/223ef076-9a2d-4062-98c2-25f95c7952d0.png",
    appTitle: "Ellis TCG Card Search",
    phoneNumber: "447483251962",
    buttonText: "Add to Inquiry List",
    addedText: "Added to List"
};

const API = "https://api.pokemontcg.io/v2/cards";
let gbpRate = 0.78;
let cards = [];
let shoppingList = JSON.parse(localStorage.getItem('tcgInquiryList')) || [];
let deferredPrompt;

// PWA Install
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'block';
});

function triggerInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((choiceResult) => {
      if (choiceResult.outcome === 'accepted') document.getElementById('installBanner').style.display = 'none';
      deferredPrompt = null;
    });
  }
}

// NAVIGATION FIX
window.onpopstate = function(event) {
    if (document.getElementById('details-view').style.display === 'block') {
        closeCardUI();
        if (event.state && event.state.fromList) {
            document.getElementById('list-modal').style.display = 'block';
        }
    } else if (document.getElementById('list-modal').style.display === 'block') {
        hideListUI();
    }
};

async function startup() {
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    document.getElementById('ui-logo-ad').src = APP_CONFIG.logoUrl;
    document.getElementById('ui-app-title').innerText = APP_CONFIG.appTitle;
    updateCartUI();
    try {
        const res = await fetch("https://open.er-api.com/v6/latest/USD");
        const data = await res.json();
        gbpRate = data.rates.GBP || 0.78;
    } catch(e) {}
}

document.getElementById('searchInput').addEventListener('input', debounce(async (e) => {
    const val = e.target.value.trim();
    if (val.length < 3) {
        document.getElementById('ad-container').style.display = 'block';
        document.getElementById('results-view').innerHTML = "";
        return;
    }
    document.getElementById('ad-container').style.display = 'none';
    document.getElementById('results-view').innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;"><i class="fa-solid fa-spinner fa-spin fa-2x"></i></div>`;
    const q = val.includes('/') ? `number:${val.split('/')[0]} AND set.printedTotal:${val.split('/')[1]}` : `name:"${val}*"`;
    try {
        const res = await fetch(`${API}?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        cards = data.data || [];
        renderGrid();
    } catch(err) {}
}, 500));

function renderGrid() {
    const grid = document.getElementById('results-view');
    grid.innerHTML = cards.map((c, i) => `
        <div class="card" onclick="openCardFromObject(${i})">
            <div class="card-img"><img src="${c.images.small}" loading="lazy"></div>
            <div class="card-name">${c.name}</div>
            <div style="font-size:12px; color:var(--text-secondary);">${c.set.name}</div>
        </div>
    `).join('');
}

function openCardFromObject(index) {
    showCardDetails(cards[index], false);
}

function reopenCardFromList(index) {
    showCardDetails(shoppingList[index].fullData, true);
}

function showCardDetails(c, fromList) {
    history.pushState({view: 'card', fromList: fromList}, '');

    document.getElementById('results-view').style.display = 'none';
    document.getElementById('mainHeader').style.display = 'none';
    document.getElementById('ad-container').style.display = 'none';
    document.getElementById('list-modal').style.display = 'none';
    
    const view = document.getElementById('details-view');
    view.style.display = 'block';
    
    const displayNum = `${c.number}/${c.set.printedTotal}`;
    const prices = c.tcgplayer?.prices || {};
    let variants = "";
    
    if (Object.keys(prices).length > 0) {
        for (const type in prices) {
            const market = prices[type].market;
            if (market) {
                const gbp = (market * gbpRate * 1.10).toFixed(2);
                variants += generatePriceBox(c, type, gbp);
            }
        }
    } else {
        variants = generatePriceBox(c, "Standard", "TBC");
    }

    view.innerHTML = `<div class="details-card">
        <img src="${c.images.large}" class="details-img">
        <h1 style="text-align:center; font-size:24px;">${c.name}</h1>
        <p style="text-align:center; color:var(--text-secondary); margin-bottom:20px;">${c.set.name} • #${displayNum}</p>
        ${variants}
        <button class="btn btn-back" onclick="handleBack()">
            ${fromList ? '<i class="fa-solid fa-list"></i> Back to Inquiry List' : '<i class="fa-solid fa-arrow-left"></i> Back to Search'}
        </button>
    </div>`;
    window.scrollTo(0,0);
}

function generatePriceBox(c, type, price) {
    const isAdded = shoppingList.some(item => item.id === c.id && item.type === type);
    return `<div class="price-box">
        <div style="font-size:12px; color:var(--text-secondary); text-transform:uppercase;">${type}</div>
        <div class="price-tag">${price === "TBC" ? "TBC" : "£"+price}</div>
        <button id="btn-${c.id}-${type}" class="${isAdded ? 'btn btn-added' : 'btn btn-wa'}" ${isAdded ? 'disabled' : ''} 
                onclick='addItem(${JSON.stringify(c).replace(/'/g, "&apos;")}, "${type}", "${price}")'>
            ${isAdded ? '<i class="fa-solid fa-check"></i> Added' : '<i class="fa-solid fa-plus"></i> Add to List'}
        </button>
    </div>`;
}

function addItem(c, type, price) {
    shoppingList.push({ 
        id: c.id, 
        name: c.name, 
        set: c.set.name, 
        num: `${c.number}/${c.set.printedTotal}`, 
        type: type, 
        price: price, 
        imageUrl: c.images.large, 
        fullData: c 
    });
    localStorage.setItem('tcgInquiryList', JSON.stringify(shoppingList));
    updateCartUI();
    const b = document.getElementById(`btn-${c.id}-${type}`);
    b.className = "btn btn-added"; b.innerHTML = '<i class="fa-solid fa-check"></i> Added'; b.disabled = true;
}

function updateCartUI() {
    const bar = document.getElementById('cartBar');
    bar.style.display = shoppingList.length > 0 ? 'flex' : 'none';
    document.getElementById('cartCount').innerText = shoppingList.length;
}

function showList() {
    history.pushState({view: 'list'}, '');
    const container = document.getElementById('list-items-container');
    container.innerHTML = shoppingList.map((item, index) => `
        <div class="list-item" onclick="reopenCardFromList(${index})">
            <div style="padding-left:10px;">
                <div style="font-weight:700;">${item.name}</div>
                <div style="font-size:12px; color:var(--primary); font-weight:700;">${item.price === "TBC" ? "TBC" : "£"+item.price} (${item.type})</div>
            </div>
            <button class="remove-btn" onclick="event.stopPropagation(); removeItem(${index})">Remove</button>
        </div>
    `).join('') || "<p style='text-align:center; padding:20px;'>No cards in list</p>";
    document.getElementById('list-modal').style.display = 'block';
}

function removeItem(i) {
    shoppingList.splice(i, 1);
    localStorage.setItem('tcgInquiryList', JSON.stringify(shoppingList));
    updateCartUI();
    showList();
}

function handleBack() { window.history.back(); }

function closeCardUI() {
    document.getElementById('details-view').style.display = 'none';
    document.getElementById('results-view').style.display = 'grid';
    document.getElementById('mainHeader').style.display = 'block';
    if(document.getElementById('searchInput').value.length < 3) document.getElementById('ad-container').style.display = 'block';
}

function hideListUI() { document.getElementById('list-modal').style.display = 'none'; }

function sendFinalWhatsApp() {
    if (shoppingList.length === 0) return;
    
    let message = "Hi Dave, I'm checking if you have these cards. I understand prices are guides:\n\n";
    
    shoppingList.forEach((item, i) => {
        const p = item.price === "TBC" ? "TBC" : `£${item.price}`;
        message += `*${i+1}. ${item.name}*\nSet: ${item.set} (#${item.num})\nVariant: ${item.type} | Guide: ${p}\nImage: ${item.imageUrl}\n\n`;
    });
    
    const waLink = `https://wa.me/${APP_CONFIG.phoneNumber}?text=${encodeURIComponent(message)}`;
    window.open(waLink, '_blank');
}

function debounce(fn, t) {
    let timer;
    return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), t); };
}

startup();
</script>
</body>
</html>
