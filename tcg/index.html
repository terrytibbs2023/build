<script>
let deferredPrompt;
const installBtn = document.getElementById('installAppBtn');

// This makes the button visible immediately so you can see it
installBtn.style.display = 'flex';

window.addEventListener('beforeinstallprompt', (e) => {
    // This is for Android/Chrome/Edge
    e.preventDefault();
    deferredPrompt = e;
    console.log('Install prompt captured');
});

function installPWA() {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    if (isIOS) {
        // iPhone specific help
        alert("To install on iPhone:\n\n1. Tap the 'Share' icon (the square with an arrow at the bottom).\n2. Scroll down and tap 'Add to Home Screen'.");
    } else if (deferredPrompt) {
        // Android/PC official prompt
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') installBtn.style.display = 'none';
            deferredPrompt = null;
        });
    } else {
        // Fallback for browsers that don't support the prompt
        alert("To install this app, please use your browser's menu and select 'Install' or 'Add to Home Screen'.");
    }
}
</script>
