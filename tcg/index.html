<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ellis TCG Card Search</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #007AFF;
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #000000;
            --text-secondary: #8E8E93;
            --whatsapp: #25D366;
            --ebay: #0064D2;
            --header-bg: rgba(255, 255, 255, 0.9);
            --disabled: #C7C7CC;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; background-color: var(--bg); font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .app-container { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; padding-bottom: 100px; }
        
        .app-header { position: sticky; top: 0; z-index: 1000; background: var(--header-bg); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.08); padding: 10px 0 16px; }
        .details-header { display: none; position: sticky; top: 0; z-index: 1100; background: var(--header-bg); backdrop-filter: blur(20px); height: 60px; align-items: center; padding: 0 16px; border-bottom: 1px solid rgba(0,0,0,0.08); }
        .nav-back-btn { background: none; border: none; color: var(--primary); font-size: 17px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .large-title { padding: 15px 20px 15px; font-size: 28px; font-weight: 800; }
        .search-area { padding: 0 16px; }
        .search-pill { background: rgba(118, 118, 128, 0.12); border-radius: 12px; height: 46px; display: flex; align-items: center; padding: 0 16px; }
        .search-pill input { background: none; border: none; outline: none; width: 100%; font-size: 17px; margin-left: 10px; }

        /* SPONSOR STYLES */
        #ad-container { padding: 16px; }
        .ad-card { background: #ffffff; border-radius: 20px; overflow: hidden; text-decoration: none; display: block; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 20px rgba(0,0,0,0.04); margin-bottom: 16px; }
        .ad-banner-bg { background: #f9f9fb; width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .ad-banner-img { max-width: 80%; max-height: 80%; object-fit: contain; }
        .ad-content { padding: 20px; border-top: 1px solid rgba(0,0,0,0.03); text-align: left; }
        .ad-tag { color: var(--primary); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: inline-block; }
        .ad-title { font-size: 20px; font-weight: 800; color: var(--text-main); margin-bottom: 6px; }
        .ad-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.4; }

        .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 16px; }
        .card { background: var(--card-bg); border-radius: 18px; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }
        .card-img { width: 100%; aspect-ratio: 1 / 1.38; background: #F9F9FB; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .card-img img { max-width: 90%; max-height: 90%; object-fit: contain; }

        #details-view { display: none; padding: 16px; }
        .details-card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .details-img { width: 100%; border-radius: 15px; margin-bottom: 20px; }
        .price-box { background: var(--bg); border-radius: 18px; padding: 20px; margin-top: 15px; text-align: center; }
        .price-tag { font-size: 32px; font-weight: 800; color: var(--primary); margin: 4px 0 15px; }
        
        .btn { display: flex; align-items: center; justify-content: center; height: 54px; width: 100%; border-radius: 14px; font-weight: 700; border: none; cursor: pointer; text-decoration: none; gap: 8px; }
        .btn-wa { background: var(--whatsapp); color: white; }
        .btn-ebay-small { height: 38px; font-size: 13px; background: none; color: var(--ebay); border: 1.5px solid var(--ebay); margin-top: 12px; }
        .btn-added { background: var(--disabled); color: white; cursor: default; }

        .cart-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--text-main); color: white; height: 60px; border-radius: 30px; display: none; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 2000; cursor: pointer; }
        #list-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; padding: 20px; overflow-y: auto; }
        .list-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header" id="mainHeader">
        <div class="large-title">Ellis TCG Card Search</div>
        <div class="search-area">
            <div class="search-pill">
                <i class="fa-solid fa-magnifying-glass" style="color:var(--text-secondary)"></i>
                <input type="text" id="searchInput" placeholder="Search card name or number...">
            </div>
        </div>
    </header>

    <div class="details-header" id="detailsHeader">
        <button class="nav-back-btn" onclick="handleBack()">
            <i class="fa-solid fa-chevron-left"></i> <span id="backText">Back</span>
        </button>
    </div>

    <div id="ad-container">
        <a href="https://www.facebook.com/p/East-Coast-Collectables-61583954579869/" target="_blank" class="ad-card">
            <div class="ad-banner-bg">
                <img src="https://scontent-lhr6-2.xx.fbcdn.net/v/t39.30808-6/586722015_122100567723131819_786900678622678002_n.jpg?_nc_cat=104&ccb=1-7&_nc_sid=2a1932&_nc_ohc=WDWwua9SFZIQ7kNvwF5bdl7&_nc_oc=AdrgqHXe0nTdxZuJqVy86pAsbe-mEkL3WEmcqBExPxPBNcf7dEGr1m37DXiqJFBBd8A&_nc_zt=23&_nc_ht=scontent-lhr6-2.xx&_nc_gid=APuFORar1eguSeHTQaIvCw&_nc_ss=7a389&oh=00_Af0G-vSpnAli0Ro0h5J8BCvIpa-u4LayR71DvERIZLcBeg&oe=69E40DB7" class="ad-banner-img">
            </div>
            <div class="ad-content">
                <span class="ad-tag">Shop Pokémon</span>
                <div class="ad-title">Magic Madhouse</div>
                <div class="ad-desc">Buy Booster Boxes, Elite Trainer Boxes, and TCG accessories.</div>
            </div>
        </a>

        <a href="https://essexconsolerepair.co.uk" target="_blank" class="ad-card">
            <div class="ad-banner-bg">
                <img src="https://imagecdn.websitebuilder.prositehosting.co.uk/22/3e/223ef076-9a2d-4062-98c2-25f95c7952d0.png" class="ad-banner-img">
            </div>
            <div class="ad-content">
                <span class="ad-tag">Official Sponsor</span>
                <div class="ad-title">Essex Console Repair</div>
                <div class="ad-desc">Ps5/Xbox/Switch/Hdmi Ports</div>
            </div>
        </a>
    </div>

    <div id="results-view" class="card-grid"></div>
    <div id="details-view"></div>
</div>

<div class="cart-bar" id="cartBar" onclick="showList()">
    <span>View Inquiry List</span>
    <span id="cartCount" style="background:var(--primary); padding:4px 10px; border-radius:10px;">0</span>
</div>

<div id="list-modal">
    <h2 style="margin-bottom: 20px; font-size: 24px; font-weight: 800;">Your Inquiry List</h2>
    <div id="list-items-container"></div>
    <div style="margin-top: 30px;">
        <button class="btn btn-wa" onclick="sendFinalWhatsApp()"><i class="fa-brands fa-whatsapp"></i> Send Inquiry To EllisTcg</button>
        <button class="btn" style="margin-top:15px; background:rgba(0,0,0,0.05);" onclick="handleBack()">Close & Continue Searching</button>
    </div>
</div>

<script>
const APP_CONFIG = { 
    phoneNumber: "447483251962",
    buttonText: "Add to Inquiry List",
    addedText: "Added to List"
};
const API = "https://api.pokemontcg.io/v2/cards";
let gbpRate = 0.78;
let cards = [];
let shoppingList = JSON.parse(localStorage.getItem('tcgInquiryList')) || [];

window.onpopstate = (event) => {
    if (document.getElementById('details-view').style.display === 'block') {
        closeCardUI();
        if (event.state && event.state.fromList) showList(true);
    } else if (document.getElementById('list-modal').style.display === 'block') {
        hideListUI();
    }
};

async function startup() {
    document.getElementById('searchInput').disabled = false;
    updateCartUI();
    try {
        const res = await fetch("https://open.er-api.com/v6/latest/USD");
        const data = await res.json();
        gbpRate = data.rates.GBP || 0.78;
    } catch(e) {}
}

document.getElementById('searchInput').addEventListener('input', debounce(async (e) => {
    const val = e.target.value.trim();
    if (val.length < 3) { 
        document.getElementById('results-view').innerHTML = ""; 
        document.getElementById('ad-container').style.display = 'block';
        return; 
    }
    document.getElementById('ad-container').style.display = 'none';
    document.getElementById('results-view').innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:40px;"><i class="fa-solid fa-spinner fa-spin"></i> Searching...</p>`;
    const q = val.includes('/') ? `number:${val.split('/')[0]} AND set.printedTotal:${val.split('/')[1]}` : `name:"${val}*"`;
    const res = await fetch(`${API}?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    cards = data.data || [];
    renderGrid();
}, 500));

function renderGrid() {
    document.getElementById('results-view').innerHTML = cards.map((c, i) => `
        <div class="card" onclick="openCard(${i}, false)">
            <div class="card-img"><img src="${c.images.small}"></div>
            <div style="font-weight:700; font-size:14px;">${c.name}</div>
            <div style="font-size:11px; color:var(--text-secondary);">${c.set.name}</div>
        </div>
    `).join('');
}

function openCard(idx, fromList) {
    const c = fromList ? shoppingList[idx].fullData : cards[idx];
    history.pushState({view: 'card', fromList: fromList}, '');
    
    document.getElementById('mainHeader').style.display = 'none';
    document.getElementById('results-view').style.display = 'none';
    document.getElementById('list-modal').style.display = 'none';
    document.getElementById('ad-container').style.display = 'none';
    document.getElementById('detailsHeader').style.display = 'flex';
    document.getElementById('backText').innerText = fromList ? "Back to Inquiry List" : "Back to Search";
    
    const view = document.getElementById('details-view');
    view.style.display = 'block';

    const displayNum = `${c.number}/${c.set.printedTotal || '?'}`;
    const ebayLink = `https://www.ebay.co.uk/sch/i.html?_from=R40&_nkw=${encodeURIComponent(c.name + ' ' + displayNum + ' ' + c.set.name + ' pokemon sold')}&LH_Sold=1&LH_Complete=1`;
    
    const prices = c.tcgplayer?.prices || {};
    let variants = "";
    for (const type in prices) {
        if (prices[type].market) {
            const val = (prices[type].market * gbpRate * 1.10).toFixed(2);
            variants += generatePriceBox(c, type, val, ebayLink);
        }
    }
    if(!variants) variants = generatePriceBox(c, "Standard", "TBC", ebayLink);

    view.innerHTML = `<div class="details-card">
        <img src="${c.images.large}" class="details-img">
        <h1 style="text-align:center;">${c.name}</h1>
        <p style="text-align:center; color:var(--text-secondary); margin-bottom:10px;">${c.set.name} • #${displayNum}</p>
        ${variants}
        <button class="btn" style="margin-top:20px; background:rgba(0,0,0,0.05);" onclick="handleBack()">Back</button>
    </div>`;
    window.scrollTo(0,0);
}

function generatePriceBox(c, type, priceDisplay, ebayLink) {
    const isAdded = shoppingList.some(item => item.id === c.id && item.type === type);
    const btnClass = isAdded ? "btn btn-added" : "btn btn-wa";
    const btnText = isAdded ? `<i class="fa-solid fa-check"></i> ${APP_CONFIG.addedText}` : `<i class="fa-solid fa-plus"></i> ${APP_CONFIG.buttonText}`;
    const btnAttr = isAdded ? "disabled" : "";
    const priceVal = priceDisplay === "TBC" ? "TBC" : `£${priceDisplay}`;

    return `<div class="price-box">
        <div style="font-size:12px; font-weight:700; color:var(--text-secondary); text-transform:uppercase;">${type} - Guide Price</div>
        <div class="price-tag">${priceVal}</div>
        <button id="btn-${c.id}-${type}" class="${btnClass}" ${btnAttr} 
                onclick='addItem(${JSON.stringify(c).replace(/'/g, "&apos;")}, "${type}", "${priceVal}")'>
            ${btnText}
        </button>
        <a href="${ebayLink}" target="_blank" class="btn btn-ebay-small">
            <i class="fa-brands fa-ebay"></i> View eBay Last Sold
        </a>
    </div>`;
}

function addItem(c, type, priceVal) {
    shoppingList.push({ id: c.id, name: c.name, type, price: priceVal, imageUrl: c.images.large, fullData: c });
    localStorage.setItem('tcgInquiryList', JSON.stringify(shoppingList));
    updateCartUI();
    const b = document.getElementById(`btn-${c.id}-${type}`);
    if(b) { b.className = "btn btn-added"; b.innerHTML = `<i class="fa-solid fa-check"></i> ${APP_CONFIG.addedText}`; b.disabled = true; }
}

function updateCartUI() {
    document.getElementById('cartBar').style.display = shoppingList.length > 0 ? 'flex' : 'none';
    document.getElementById('cartCount').innerText = shoppingList.length;
}

function showList(isBackNav = false) {
    if (!isBackNav) history.pushState({view: 'list'}, '');
    const container = document.getElementById('list-items-container');
    container.innerHTML = shoppingList.map((item, index) => `
        <div class="list-item" onclick="openCard(${index}, true)">
            <div>
                <div style="font-weight:700;">${item.name}</div>
                <div style="color:var(--primary); font-size:12px; font-weight:600;">${item.type} - Guide: ${item.price}</div>
            </div>
            <button onclick="event.stopPropagation(); removeItem(${index})" style="color:red; background:none; border:none; font-weight:600;">Remove</button>
        </div>
    `).join('') || "<p style='text-align:center;'>Your list is empty.</p>";
    document.getElementById('list-modal').style.display = 'block';
}

function removeItem(i) { shoppingList.splice(i, 1); localStorage.setItem('tcgInquiryList', JSON.stringify(shoppingList)); updateCartUI(); showList(true); }

function handleBack() {
    if (document.getElementById('details-view').style.display === 'block') {
        if (history.state && history.state.fromList) {
            closeCardUI();
            showList(true);
            return;
        }
    }
    window.history.back();
}

function hideListUI() { document.getElementById('list-modal').style.display = 'none'; }
function closeCardUI() {
    document.getElementById('details-view').style.display = 'none';
    document.getElementById('detailsHeader').style.display = 'none';
    document.getElementById('results-view').style.display = 'grid';
    document.getElementById('mainHeader').style.display = 'block';
    if(document.getElementById('searchInput').value.length < 3) document.getElementById('ad-container').style.display = 'block';
}

function sendFinalWhatsApp() {
    let msg = "Hi Dave, Do you have these cards? I UNDERSTAND THE PRICES ARE GUIDE ONLY so can you give me the total you can sell for please?:\n\n";
    shoppingList.forEach((item, i) => {
        const c = item.fullData;
        const displayNum = `#${c.number}/${c.set.printedTotal || '?'}`;
        msg += `*${i+1}. ${item.name}* (${displayNum}) [${item.type}] - Guide: ${item.price}\nLink: ${item.imageUrl}\n\n`;
    });
    window.open(`https://wa.me/${APP_CONFIG.phoneNumber}?text=${encodeURIComponent(msg)}`, '_blank');
}

function debounce(fn, t) { let timer; return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), t); }; }
startup();
</script>
</body>
</html>
