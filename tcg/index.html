<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Ellis TCG Card Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            /* Prevents the 'bounce' effect on some browsers to allow our custom pull-to-refresh */
            overscroll-behavior-y: contain; 
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Pull to refresh visual */
        #ptr-element {
            height: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: height 0.2s ease;
            background: transparent;
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 min-h-screen transition-colors duration-300">

<div id="ptr-element" class="text-blue-500 font-bold text-sm">
    <svg class="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
    </svg>
</div>

<div id="app"></div>

<script>
// ============== CONFIG ==============
const APP_CONFIG = {
    logoUrl: "https://imagecdn.websitebuilder.prositehosting.co.uk/22/3e/223ef076-9a2d-4062-98c2-25f95c7952d0.png",
    appTitle: "Ellis TCG Card Search",
    storeUrl: "https://essexconsolerepair.co.uk",
    adTitle: "Essex Console Repair",
    adDescription: "Ps5/Xbox/Switch/Hdmi Ports",
    phoneNumber: "447483251962",
    buttonText: "Add to Inquiry List",
    addedText: "Added to List"
};

const API_BASE = "https://api.pokemontcg.io/v2";

// ============== STATE ==============
let state = {
    view: 'search',
    cards: [],
    selectedCard: null,
    shoppingList: JSON.parse(localStorage.getItem('tcgInquiryList') || '[]'),
    searchTerm: '',
    selectedSet: '',
    selectedRarity: '',
    sets: [],
    rarities: [],
    gbpRate: 0.78,
    isLoading: false,
    hasSearched: false,
    showAd: true,
    isDark: localStorage.getItem('theme') === 'dark'
};

let searchTimeout = null;

// ============== PULL TO REFRESH LOGIC ==============
let touchStart = 0;
let touchEnd = 0;

window.addEventListener('touchstart', e => {
    touchStart = e.targetTouches[0].pageY;
}, {passive: true});

window.addEventListener('touchmove', e => {
    const touchCurrent = e.targetTouches[0].pageY;
    const ptr = document.getElementById('ptr-element');
    // Only pull to refresh if at the top of the search view
    if (window.scrollY === 0 && state.view === 'search' && touchCurrent > touchStart) {
        const distance = touchCurrent - touchStart;
        if (distance < 80) ptr.style.height = distance + 'px';
    }
}, {passive: true});

window.addEventListener('touchend', e => {
    const ptr = document.getElementById('ptr-element');
    if (ptr.offsetHeight > 60) {
        location.reload(); // Hard refresh to reset the app state
    }
    ptr.style.height = '0px';
}, {passive: true});

// ============== UTILITIES ==============
function generateBarcodeString(card, variantType) {
    const namePrefix = card.name.substring(0, 3).toUpperCase();
    const setId = card.set.id;
    const cardNum = card.number.padStart(3, '0');
    const typePrefix = variantType.substring(0, 2).toUpperCase();
    return `${namePrefix}-${setId}-${cardNum}-${typePrefix}`;
}

function generateBarWidths(barcodeString) {
    let seed = 0;
    for (let i = 0; i < barcodeString.length; i++) {
        seed += barcodeString.charCodeAt(i) * (i + 1);
    }
    const bars = [];
    let current = seed;
    for (let i = 0; i < 40; i++) {
        current = (current * 9301 + 49297) % 233280;
        bars.push((current % 4) + 2); 
    }
    return bars;
}

function formatPrice(usd) {
    const gbp = usd * state.gbpRate * 1.10;
    return `£${gbp.toFixed(2)}`;
}

function debounce(fn, delay) {
    return function(...args) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => fn.apply(this, args), delay);
    };
}

// ============== API ==============
async function initApp() {
    try {
        const [setsRes, raritiesRes, rateRes] = await Promise.all([
            fetch(`${API_BASE}/sets?orderBy=-releaseDate`),
            fetch(`${API_BASE}/rarities`),
            fetch('https://open.er-api.com/v6/latest/USD')
        ]);
        const setsData = await setsRes.json();
        const raritiesData = await raritiesRes.json();
        const rateData = await rateRes.json();
        state.sets = setsData.data || [];
        state.rarities = raritiesData.data || [];
        state.gbpRate = rateData.rates?.GBP || 0.78;
        render();
    } catch (error) {
        console.error('Failed to initialize:', error);
    }
}

async function searchCards() {
    const { searchTerm, selectedSet, selectedRarity } = state;
    if (!searchTerm && !selectedSet && !selectedRarity) {
        state.cards = [];
        state.showAd = true;
        state.hasSearched = false;
        render();
        return;
    }
    if (searchTerm && searchTerm.length < 3 && !selectedSet && !selectedRarity) return;
    
    state.showAd = false;
    state.isLoading = true;
    state.hasSearched = true;
    render();

    const queryParts = [];
    if (searchTerm && searchTerm.length >= 3) {
        if (searchTerm.includes('/')) {
            const parts = searchTerm.split('/');
            queryParts.push(`number:${parts[0]} AND set.printedTotal:${parts[1]}`);
        } else {
            queryParts.push(`name:"${searchTerm}*"`);
        }
    }
    if (selectedSet) queryParts.push(`set.name:"${selectedSet}"`);
    if (selectedRarity) queryParts.push(`rarity:"${selectedRarity}"`);
    const query = queryParts.join(' AND ');

    try {
        const res = await fetch(`${API_BASE}/cards?q=${encodeURIComponent(query)}&orderBy=number`);
        const data = await res.json();
        state.cards = data.data || [];
    } catch (error) {
        state.cards = [];
    } finally {
        state.isLoading = false;
        render();
    }
}

const debouncedSearch = debounce(searchCards, 1500);

// ============== ACTIONS ==============
function toggleTheme() {
    state.isDark = !state.isDark;
    localStorage.setItem('theme', state.isDark ? 'dark' : 'light');
    document.documentElement.classList.toggle('dark', state.isDark);
    render();
}

function handleSearchChange(value) {
    state.searchTerm = value;
    debouncedSearch();
}

function handleSetChange(value) {
    state.selectedSet = value;
    searchCards();
}

function handleRarityChange(value) {
    state.selectedRarity = value;
    searchCards();
}

function handleCardClick(card) {
    state.selectedCard = card;
    state.view = 'details';
    history.pushState({ view: 'details' }, '');
    window.scrollTo(0, 0);
    render();
}

function handleAddToList(card, type, price) {
    const uid = `${card.id}-${type}`;
    if (state.shoppingList.some(item => item.uid === uid)) return;
    state.shoppingList.push({
        uid, name: card.name, set: card.set.name,
        num: `${card.number}/${card.set.printedTotal}`,
        type, price, imageUrl: card.images.large, fullData: card
    });
    localStorage.setItem('tcgInquiryList', JSON.stringify(state.shoppingList));
    render();
}

function handleRemoveItem(index) {
    state.shoppingList.splice(index, 1);
    localStorage.setItem('tcgInquiryList', JSON.stringify(state.shoppingList));
    render();
}

function handleSendWhatsApp() {
    if (state.shoppingList.length === 0) return;
    let message = "Hi Dave, I'm checking if you have these cards. I understand prices are guides:\n\n";
    state.shoppingList.forEach((item, i) => {
        message += `*${i + 1}. ${item.name}*\nSet: ${item.set} (#${item.num})\nVariant: ${item.type} | Guide: ${item.price === 'TBC' ? 'TBC' : item.price}\nImage: ${item.imageUrl}\n\n`;
    });
    window.open(`https://wa.me/${APP_CONFIG.phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
}

function goBack() {
    if (window.history.length > 1 && state.view !== 'search') {
        history.back();
    } else {
        state.view = 'search';
        state.selectedCard = null;
        render();
    }
}

function openList() {
    state.view = 'list';
    history.pushState({ view: 'list' }, '');
    window.scrollTo(0, 0);
    render();
}

// ============== COMPONENTS ==============
function renderSearchHeader() {
    return `
        <header class="sticky top-0 z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-b border-slate-200 dark:border-slate-700">
            <div class="flex items-center justify-between px-4 py-3">
                <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">${APP_CONFIG.appTitle}</h1>
                <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    ${state.isDark ? '☀️' : '🌙'}
                </button>
            </div>
            <div class="px-4 pb-3">
                <div class="relative bg-slate-100 dark:bg-slate-800 rounded-xl flex items-center px-4 h-12">
                    <input type="text" value="${state.searchTerm}" oninput="handleSearchChange(this.value)" placeholder="Card name or number..." class="w-full bg-transparent border-none outline-none text-slate-900 dark:text-white placeholder-slate-400" />
                </div>
            </div>
            <div class="flex gap-2 px-4 pb-4 overflow-x-auto scrollbar-hide">
                <select onchange="handleSetChange(this.value)" class="bg-white dark:bg-slate-800 rounded-lg px-3 py-2 border text-sm font-semibold">
                    <option value="">All Sets</option>
                    ${state.sets.map(s => `<option value="${s.name}" ${state.selectedSet === s.name ? 'selected' : ''}>${s.name}</option>`).join('')}
                </select>
                <select onchange="handleRarityChange(this.value)" class="bg-white dark:bg-slate-800 rounded-lg px-3 py-2 border text-sm font-semibold">
                    <option value="">All Rarities</option>
                    ${state.rarities.map(r => `<option value="${r}" ${state.selectedRarity === r ? 'selected' : ''}>${r}</option>`).join('')}
                </select>
            </div>
        </header>
    `;
}

function renderSponsorCard() {
    return `
        <div class="p-4">
            <a href="${APP_CONFIG.storeUrl}" target="_blank" class="block bg-white dark:bg-slate-800 rounded-2xl overflow-hidden shadow-md border border-slate-100 dark:border-slate-700">
                <div class="bg-slate-100 dark:bg-slate-700 h-40 flex items-center justify-center p-4">
                    <img src="${APP_CONFIG.logoUrl}" alt="Sponsor" class="max-w-[80%] max-h-[80%] object-contain" />
                </div>
                <div class="p-4">
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white">${APP_CONFIG.adTitle}</h3>
                    <p class="text-sm text-slate-500 dark:text-slate-400">${APP_CONFIG.adDescription}</p>
                </div>
            </a>
        </div>
    `;
}

function renderCardGrid() {
    if (state.cards.length === 0) {
        return state.hasSearched ? `<div class="py-20 text-center text-slate-400">No cards found</div>` : '';
    }
    return `
        <div class="grid grid-cols-2 gap-4 p-4">
            ${state.cards.map((card, i) => `
                <button onclick="handleCardClick(state.cards[${i}])" class="bg-white dark:bg-slate-800 rounded-2xl p-3 shadow-md border border-slate-100 dark:border-slate-700 text-left">
                    <div class="aspect-[1/1.4] bg-slate-100 dark:bg-slate-700 rounded-xl mb-2 flex items-center justify-center overflow-hidden">
                        <img src="${card.images.small}" alt="${card.name}" loading="lazy" class="max-w-[90%] max-h-[90%] object-contain" />
                    </div>
                    <h3 class="font-bold text-sm text-slate-900 dark:text-white line-clamp-2">${card.name}</h3>
                </button>
            `).join('')}
        </div>
    `;
}

function renderCardDetails() {
    const card = state.selectedCard;
    if (!card) return '';
    const displayNum = `${card.number}/${card.set.printedTotal}`;
    const ebayLink = `https://www.ebay.co.uk/sch/i.html?_from=R40&_nkw=${encodeURIComponent(card.name + ' ' + displayNum + ' ' + card.set.name + ' sold')}&LH_Sold=1&LH_Complete=1`;
    const prices = card.tcgplayer?.prices || {};

    let priceBoxes = Object.entries(prices).map(([type, priceData]) => {
        const market = priceData.market;
        if (!market) return '';
        const priceDisplay = formatPrice(market);
        const barcodeString = generateBarcodeString(card, type);
        const barWidths = generateBarWidths(barcodeString);
        const isAdded = state.shoppingList.some(item => item.uid === `${card.id}-${type}`);

        return `
            <div class="bg-slate-50 dark:bg-slate-700/50 rounded-2xl p-5 mb-4">
                <div class="text-4xl font-bold text-center text-blue-600 dark:text-blue-400 mb-4">${priceDisplay}</div>
                <div class="bg-white dark:bg-slate-800 rounded-xl p-4 mb-4">
                    <div class="flex justify-center items-end gap-[2px] h-20">
                        ${barWidths.map(w => `<div class="bg-slate-900 dark:bg-white" style="width: ${w}px; height: 100%"></div>`).join('')}
                    </div>
                    <div class="text-xs font-mono text-center mt-2 tracking-widest font-bold">${barcodeString}</div>
                </div>
                <button onclick="handleAddToList(state.selectedCard, '${type}', '${priceDisplay}')" ${isAdded ? 'disabled' : ''} class="w-full h-14 rounded-xl font-bold ${isAdded ? 'bg-slate-300' : 'bg-green-500 text-white'}">${isAdded ? APP_CONFIG.addedText : APP_CONFIG.buttonText}</button>
                <a href="${ebayLink}" target="_blank" class="w-full h-10 mt-3 rounded-xl font-semibold flex items-center justify-center border-2 border-blue-600 text-blue-600">View eBay Sold</a>
            </div>
        `;
    }).join('');

    return `<div class="p-4"><button onclick="goBack()" class="mb-4">Back</button><div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-lg"><img src="${card.images.large}" class="w-full rounded-2xl mb-6"/><h1 class="text-2xl font-bold text-center">${card.name}</h1><p class="text-center mb-6">${card.set.name} (#${displayNum})</p><div class="bg-amber-50 p-4 mb-6 text-sm text-center"><strong>Please Note:</strong> Market guides only. Final valuations confirmed by <strong>Ellis TCG</strong>.</div>${priceBoxes || 'No prices found'}</div></div>`;
}

function renderInquiryList() {
    return `<div class="p-4"><div class="flex justify-between mb-6"><h2 class="text-2xl font-bold">List</h2><button onclick="goBack()">Close</button></div>${state.shoppingList.map((item, i) => `<div class="bg-white p-4 rounded-xl mb-3 shadow flex justify-between"><div>${item.name}<br><span class="text-blue-600 font-bold">${item.price}</span></div><button onclick="handleRemoveItem(${i})" class="text-red-500">Remove</button></div>`).join('')}<button onclick="handleSendWhatsApp()" class="w-full h-14 bg-green-500 text-white rounded-xl font-bold mt-8">Send to WhatsApp</button></div>`;
}

function render() {
    const app = document.getElementById('app');
    if (state.view === 'search') app.innerHTML = `${renderSearchHeader()}${state.showAd ? renderSponsorCard() : ''}${state.isLoading ? '<div class="text-center py-20">Searching...</div>' : renderCardGrid()}${state.shoppingList.length > 0 ? `<button onclick="openList()" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] bg-blue-600 text-white h-16 rounded-full font-bold">View List (${state.shoppingList.length})</button>` : ''}`;
    else if (state.view === 'details') app.innerHTML = renderCardDetails();
    else if (state.view === 'list') app.innerHTML = renderInquiryList();
}

// ============== INIT ==============
window.addEventListener('popstate', (e) => {
    state.view = e.state?.view || 'search';
    state.selectedCard = null;
    render();
});
document.documentElement.classList.toggle('dark', state.isDark);
initApp();
</script>
</body>
</html>
